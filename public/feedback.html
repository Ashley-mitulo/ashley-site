<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bug 反馈 · Ashley Lab</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/theme.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <div class="brand"><div class="brand-mark">A</div>
      <div><div class="brand-name">Ashley Lab</div><div class="brand-sub">南京 · 智能系统实验室</div></div></div>
    <div class="nav-menu">
      <a href="/">首页</a><a href="/about.html">关于我</a>
      <a href="/projects.html">项目展示</a><a href="/feedback.html" class="active">Bug 反馈</a>
    </div>
    <div class="nav-user" id="navUser"></div>
  </div>
</nav>

<section class="hero" style="padding:60px 24px;">
  <div class="hero-inner"><h1>Bug 反馈 & 建议</h1>
    <p class="subtitle">每一条反馈我都会看，欢迎无情吐槽</p></div>
</section>

<section class="container" style="max-width:960px;">
  <div id="notLogged" style="display:none;">
    <div class="msg info" style="display:block;">🔒 提交 Bug 需要登录。<a href="/login.html?next=/feedback.html">点这里登录</a> 或 <a href="/register.html">注册</a>。</div>
  </div>
  <div id="loggedIn" style="display:none;">
    <div class="about-card">
      <h2 class="about-title">📝 提交新反馈</h2>
      <div id="msg" class="msg"></div>
      <form id="fbForm">
        <div class="form-group"><label>相关项目</label>
          <select id="project" required>
            <option value="accident-kg">🚗 交通事故知识图谱</option>
            <option value="elderly">🏘️ 老年友好社区工具</option>
            <option value="transport">🚦 交通智能体</option>
            <option value="site">🌐 网站本身</option>
          </select></div>
        <div class="form-group"><label>严重程度</label>
          <select id="severity">
            <option value="normal">一般</option>
            <option value="critical">紧急</option>
            <option value="minor">建议</option>
          </select></div>
        <div class="form-group"><label>标题</label>
          <input type="text" id="title" required maxlength="120" placeholder="一句话描述"></div>
        <div class="form-group"><label>详细描述</label>
          <textarea id="content" required maxlength="4000" placeholder="做了什么 → 期望 → 实际。步骤/截图越详细越好。"></textarea></div>
        <button type="submit" class="btn-submit" id="btn">提交反馈</button>
      </form>
    </div>
    <h3 style="margin-top:48px;color:var(--primary);">📚 最近反馈</h3>
    <div class="feedback-list" id="fbList"></div>
  </div>
</section>

<footer class="footer">© 2026 Ashley · 南京</footer>

<script src="/js/app.js"></script>
<script>
(async () => {
  const user = await renderNavUser();
  if (!user) {
    document.getElementById('notLogged').style.display = 'block';
    return;
  }
  document.getElementById('loggedIn').style.display = 'block';

  const params = new URLSearchParams(location.search);
  const pj = params.get('project');
  if (pj) document.getElementById('project').value = pj;

  async function loadList() {
    const res = await api.get('/api/feedback');
    const list = document.getElementById('fbList');
    if (!res.ok || !res.items.length) {
      list.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:32px;">暂无反馈</div>';
      return;
    }
    const projMap = {'accident-kg':'🚗 事故KG','elderly':'🏘️ 老年','transport':'🚦 智能体','site':'🌐 网站'};
    const sevBadge = s => `<span class="badge badge-${s}">${s==='critical'?'紧急':s==='minor'?'建议':'一般'}</span>`;
    list.innerHTML = res.items.map(it => `
      <div class="feedback-item">
        <div class="feedback-head">
          <div><strong>${it.title}</strong> ${sevBadge(it.severity)}</div>
          <div class="feedback-meta">${projMap[it.project]||it.project} · ${it.display_name||it.username} · ${fmtTime(it.created_at)}</div>
        </div>
        <div class="feedback-content">${it.content.replace(/[<>]/g,c=>c==='<'?'&lt;':'&gt;')}</div>
      </div>`).join('');
  }
  await loadList();

  document.getElementById('fbForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideMsg('msg');
    const btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '提交中...';
    const res = await api.post('/api/feedback', {
      project: document.getElementById('project').value,
      severity: document.getElementById('severity').value,
      title: document.getElementById('title').value.trim(),
      content: document.getElementById('content').value.trim(),
    });
    btn.disabled = false; btn.textContent = '提交反馈';
    if (res.ok) {
      showMsg('msg', '✅ 反馈已收到，感谢你！', 'success');
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      await loadList();
    } else {
      showMsg('msg', res.error || '提交失败', 'error');
    }
  });
})();
</script>
<!-- Cloudflare Web Analytics --><script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "REPLACE_WITH_CF_ANALYTICS_TOKEN"}'></script>
</body></html>
