// 获取预测天数
function getPredictionDays(holiday) {
  const defaultDays = ['1日', '2日', '3日', '4日', '5日', '6日', '7日'];
  switch(holiday) {
    case '元旦':
      return ['1日', '2日', '3日'];
    default:
      return defaultDays.slice(0, 7);
  }
}

// 根据年份和日期识别节假日 - 已修正:包含前3天+后3天(数据来源:中国政府网)
function getHolidayName(year, dateStr) {
  const monthDay = dateStr.match(/^(\d+)月(\d+)日/);
  if (!monthDay) return null;
  const month = parseInt(monthDay[1]);
  const day = parseInt(monthDay[2]);

  // 元旦:含前2天+后2天
  if (month === 1 && day >= 1 && day <= 3) return '元旦';
  // 国庆节:包含前3天(9月28-30日)+ 法定(10月1-7日)+ 后2天(10月8-9日)
  if ((month === 9 && day >= 28 && day <= 30) || (month === 10 && day >= 1 && day <= 9)) return '国庆节';
  // 劳动节:包含前2天 + 法定 + 后2天
  if ((month === 4 && day >= 27) || (month === 5 && day <= 7)) return '劳动节';

  // 检查各个年份的节假日时间段,包含节前节后
  if (year === 2022) {
    if (month === 4 && day >= 1 && day <= 8) return '清明节';
    if (month === 6 && day >= 1 && day <= 8) return '端午节';
    if (month === 1 && day >= 28 || month === 2 && day <= 9) return '春节';
  } else if (year === 2023) {
    if (month === 4 && day >= 2 && day <= 10) return '清明节';
    if (month === 6 && day >= 19 && day <= 27) return '端午节';
    if (month === 1 && day >= 18 && day <= 30) return '春节';
  } else if (year === 2024) {
    if ((month === 3 && day >= 31) || (month === 4 && day >= 1 && day <= 9)) return '清明节';
    if (month === 6 && day >= 4 && day <= 13) return '端午节';
    if (month === 2 && day >= 6 && day <= 20) return '春节';
  } else if (year === 2025) {
    if (month === 4 && day >= 1 && day <= 9) return '清明节';
    if ((month === 5 && day >= 28) || (month === 6 && day <= 5)) return '端午节';
    if ((month === 1 && day >= 26) || (month === 2 && day <= 7)) return '春节';
  } else if (year === 2026) {
    if (month === 4 && day >= 1 && day <= 9) return '清明节';
    if (month === 6 && day >= 16 && day <= 24) return '端午节';
    if ((month === 1 && day >= 14) || (month === 2 && day <= 4)) return '春节';
  }

  // 检查春节前后几天,当前年份没覆盖到的简单判断
  if ((month === 1 || month === 2) && year >= 2022) {
    return '春节';
  }

  return null;
}

// 推测数据来源
function guessDataSource(item) {
  // 优先使用数据中的source字段
  if (item.source) {
    return item.source;
  }
  if (item.year >= 2024) {
    return 'real';
  } else if (item.year >= 2022) {
    return 'web';
  } else {
    return 'simulated';
  }
}

// 标准化节假日名称
function normalizeHolidayName(name) {
  if (!name) return null;
  const lower = String(name).toLowerCase();
  if (lower.includes('五一') && lower.includes('劳动')) return '劳动节';
  if (lower.includes('十一') && lower.includes('国庆')) return '国庆节';
  if (lower.includes('元旦')) return '元旦';
  if (lower.includes('春节')) return '春节';
  if (lower.includes('清明')) return '清明节';
  if (lower.includes('端午')) return '端午节';
  return name.replace(/劳动节|五一/g, '劳动节').trim();
}

// 加载历史数据
async function loadHistoryData() {
  try {
    const res = await fetch(`${API_BASE}/history`);
    const result = await res.json();
    if (!result.success) {
      document.getElementById('historyTableBody').innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-500">加载失败: ${result.error}</td></tr>`;
      return;
    }

    let data = result.data;

    // 获取筛选条件
    const yearFilter = document.getElementById('filterYear').value;
    const holidayFilter = document.getElementById('filterHoliday').value;
    const typeFilter = document.getElementById('filterType').value;

    // 填充筛选下拉选项
    populateFilterOptions(data);

    // 应用筛选
    if (yearFilter) {
      data = data.filter(item => item.year == yearFilter);
    }
    if (holidayFilter) {
      data = data.filter(item => item.holiday === holidayFilter);
    }
    if (typeFilter) {
      data = data.filter(item => item.traffic_type === typeFilter);
    }

    // 按日期降序排序
    data.sort((a, b) => {
      if (a.year !== b.year) {
        return b.year - a.year;
      }
      return (b.date || '').localeCompare(a.date || '');
    });

    // 渲染表格
    const tbody = document.getElementById('historyTableBody');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400">暂无数据</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(item => {
      const trafficName = trafficTypeNames[item.traffic_type] || item.traffic_type;
      const sourceLabel = {
        'real': '实际统计',
        'web': '公开数据',
        'simulated': '模拟数据'
      }[guessDataSource(item)] || '-';
      
      return `
        <tr class="border-b border-gray-100 hover:bg-blue-50 transition-colors">
          <td class="px-4 py-3 text-left">${item.year}</td>
          <td class="px-4 py-3 text-left">${item.date || '-'}</td>
          <td class="px-4 py-3 text-left">${item.holiday || '-'}</td>
          <td class="px-4 py-3 text-left">${trafficName}</td>
          <td class="px-4 py-3 text-right font-medium text-blue-700">${item.traffic_volume ? Number(item.traffic_volume).toFixed(2) : '-'}</td>
          <td class="px-4 py-3 text-left">${sourceLabel}</td>
        </tr>
      `;
    }).join('');

    // 绑定筛选事件
    document.getElementById('filterYear').addEventListener('change', loadHistoryData);
    document.getElementById('filterHoliday').addEventListener('change', loadHistoryData);
    document.getElementById('filterType').addEventListener('change', loadHistoryData);
  } catch (err) {
    console.error('加载历史数据失败:', err);
    document.getElementById('historyTableBody').innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-500">加载失败: ${err.message}</td></tr>`;
  }
}

// 填充筛选下拉选项
function populateFilterOptions(data) {
  const years = [...new Set(data.map(item => item.year))].sort((a, b) => b - a);
  const holidays = [...new Set(data.map(item => item.holiday).filter(Boolean))].sort();
  const types = [...new Set(data.map(item => item.traffic_type))];

  const yearSelect = document.getElementById('filterYear');
  const holidaySelect = document.getElementById('filterHoliday');
  const typeSelect = document.getElementById('filterType');

  // 保留已有选择
  const selectedYear = yearSelect.value;
  const selectedHoliday = holidaySelect.value;
  const selectedType = typeSelect.value;

  yearSelect.innerHTML = '<option value="">全部年份</option>' + years.map(y => `<option value="${y}" ${y == selectedYear ? 'selected' : ''}>${y}</option>`).join('');
  holidaySelect.innerHTML = '<option value="">全部节假日</option>' + holidays.map(h => `<option value="${h}" ${h === selectedHoliday ? 'selected' : ''}>${h}</option>`).join('');
  typeSelect.innerHTML = '<option value="">全部类型</option>' + types.map(t => `<option value="${t}" ${t === selectedType ? 'selected' : ''}>${trafficTypeNames[t] || t}</option>`).join('');
}

// 绑定文件上传事件
function bindFileUpload() {
  const uploadBtn = document.getElementById('uploadBtn');
  const uploadFile = document.getElementById('uploadFile');
  const uploadResult = document.getElementById('uploadResult');

  if (!uploadBtn || !uploadFile) {
    console.log('bindFileUpload: uploadBtn or uploadFile not found');
    return;
  }

  uploadBtn.replaceWith(uploadBtn.cloneNode(true));
  const newUploadBtn = document.getElementById('uploadBtn');

  newUploadBtn.addEventListener('click', async () => {
    console.log('开始上传按钮点击事件触发');
    const file = uploadFile.files[0];
    if (!file) {
      alert('请先选择文件');
      return;
    }

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${API_BASE}/upload`, {
        method: 'POST',
        body: formData
      });
      const result = await res.json();
      if (result.success) {
        uploadResult.innerHTML = `
          <div class="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg">
            <div class="text-green-800 font-medium">上传成功!</div>
            <div class="text-sm text-green-600 mt-1">
              共添加 ${result.added} 条新记录,总计 ${result.total} 条记录
            </div>
          </div>
        `;
        setTimeout(() => {
          location.reload();
        }, 1500);
      } else {
        uploadResult.innerHTML = `
          <div class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
            <div class="text-red-800 font-medium">上传失败</div>
            <div class="text-sm text-red-600 mt-1">${result.error || '未知错误'}</div>
          </div>
        `;
      }
    } catch (err) {
      console.error('上传失败:', err);
      uploadResult.innerHTML = `
        <div class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
          <div class="text-red-800 font-medium">上传失败</div>
          <div class="text-sm text-red-600 mt-1">网络错误: ${err.message}</div>
        </div>
      `;
    }
  });
}

  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: years,
      datasets: [{
        label: '年总流量 (万辆)',
        data: totals,
        borderColor: '#3B82F6',
        backgroundColor: 'rgba(59, 130, 246, 0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 5,
        pointBackgroundColor: '#3B82F6'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true }
      },
      scales: {
        y: {
          beginAtZero: false,
          title: { display: true, text: '总流量 (万辆)' }
        }
      }
    }
  });
}

// 渲染每日分布图
function renderDailyChart(data) {
  const ctx = document.getElementById('dailyChart').getContext('2d');

  const dailyData = {};
  data.forEach(item => {
    const date = item.date;
    if (!dailyData[date]) {
      dailyData[date] = { sum: 0, count: 0 };
    }
    dailyData[date].sum += item.traffic_volume;
    dailyData[date].count++;
  });

  const labels = Object.keys(dailyData).sort();
  const averages = labels.map(d => (dailyData[d].sum / dailyData[d].count).toFixed(0));

  if (dailyChart) {
    dailyChart.destroy();
  }

  dailyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '平均日流量 (万辆)',
        data: averages,
        backgroundColor: labels.map((d, i) =>
          i === 1 ? "#10B981" :
          i === labels.length - 1 ? "#F97316" : "#3B82F6"
        ),
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: true,
          title: { display: true, text: '平均日流量 (万辆)' }
        }
      }
    }
  });
}

// 渲染预测结果
function renderPrediction(result, targetYear, holiday) {
  const card = document.getElementById('predictionCard');
  const tbody = document.getElementById('predictionBody');
  card.style.display = 'block';

  const days = getPredictionDays(holiday);
  const dailyAvg = result.prediction / days.length;
  let cumulative = 0;

  tbody.innerHTML = days.map((day, i) => {
    let volume = dailyAvg;
    if (holiday === '劳动节' && i === 2) volume *= 1.04;
    if (holiday === '劳动节' && i === 4) volume *= 0.92;
    volume = Math.round(volume);
    cumulative += volume;

    return `
      <tr class="border-b hover:bg-blue-50 transition-colors">
        <td class="p-3 text-gray-800 font-medium">${day}</td>
        <td class="p-3 text-right text-gray-800">${volume}</td>
        <td class="p-3 text-right text-gray-800 font-semibold ${i === days.length - 1 ? 'text-indigo-600' : ''}">${cumulative}</td>
      </tr>
    `;
  }).join('');

  const title = document.querySelector('#predictionCard h2');
  title.innerHTML = `🔮 ${targetYear}年 ${holidayNames[holiday] || holiday} 预测结果`;
}

  document.getElementById('predictionTotal').textContent = Math.round(result.prediction);
  document.getElementById('algorithmName').textContent = result.algorithmName || '线性回归';

  if (result.r2 !== undefined) {
    const lastYear = result.yearlyData[result.yearlyData.length - 1];
    const firstYear = result.yearlyData[0];
    const years = lastYear.year - firstYear.year;
    const growth = ((lastYear.total / firstYear.total) ** (1 / years) - 1) * 100;
    document.getElementById('growthRate').textContent = growth.toFixed(1);
  } else {
    document.getElementById('growthRate').textContent = '-';
  }
}

// 加载节日的历年历史外部数据（用于预测页面展示历年对比）
async function loadExternalDataHistory(holiday) {
  try {

    const data = await res.json();

        let weatherHtml = '<div class="space-y-3">';

        weatherHtml += '<tbody>';
        data.weather.forEach(w => {
          weatherHtml += `<tr class="text-center border-b border-yellow-100 hover:bg-yellow-100 transition-colors">`;
          weatherHtml += `<td class="py-1 font-medium">${w.year}</td>`;
          weatherHtml += `<td class="py-1">${w.condition}</td>`;
          weatherHtml += `<td class="py-1">${w.avgTemp}°C</td>`;

          weatherHtml += '</tr>';
        });
        weatherHtml += '</tbody></table></div></div>';
        document.getElementById('weatherContent').innerHTML = weatherHtml;
      } else {
        document.getElementById('weatherContent').innerHTML = '<div class="text-gray-500">暂无历史天气数据</div>';

      // ========== 文旅数据 - 历年对比 ==========
      if (data.tourism && data.tourism.length > 0) {
        let tourismHtml = '<div class="space-y-3">';
        tourismHtml += `<div class="font-medium text-red-700">📊 ${holiday} - 历年文旅对比</div>`;
        tourismHtml += '<div class="overflow-x-auto">';

          tourismHtml += `<tr class="text-center border-b border-red-100 hover:bg-red-100 transition-colors">`;
          tourismHtml += `<td class="py-1 font-medium">${t.year}</td>`;

          tourismHtml += '</tr>';
        });

        document.getElementById('tourismContent').innerHTML = tourismHtml;
      } else {
        document.getElementById('tourismContent').innerHTML = '<div class="text-gray-500">暂无历史文旅数据</div>';
      }

      // ========== 经济数据 - 历年汇总 ==========
      if (data.economy && data.economy.length > 0) {
        // 按年份分组
        const yearGroups = {};
        data.economy.forEach(q => {
          if (!yearGroups[q.year]) yearGroups[q.year] = [];
          yearGroups[q.year].push(q);

  }
}

// 渲染年度汇总表格
function renderYearlySummary(data) {
  const tbody = document.getElementById('yearly-summary-body');
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-gray-400">暂无数据</td></tr>';
    return;
  }

  // 按年份聚合数据 - 关键修复！
  const yearlyData = {};
  const yearlyDayCount = {};
  data.forEach(item => {
    const year = item.year;
    if (!yearlyData[year]) {
      yearlyData[year] = 0;
      yearlyDayCount[year] = 0;
    }
    yearlyData[year] += item.traffic_volume || 0;
    yearlyDayCount[year] += 1;
  });

  // 转换为数组并按年份排序
  const yearlyArray = Object.keys(yearlyData).map(year => ({
    year: parseInt(year),
    total: yearlyData[year],
    days: yearlyDayCount[year]
  })).sort((a, b) => a.year - b.year);

  let prevTotal = null;
  tbody.innerHTML = yearlyArray.map(item => {
    let growth = '-';
    if (prevTotal !== null && prevTotal > 0) {
      growth = ((item.total - prevTotal) / prevTotal * 100).toFixed(1);
      growth = growth + '%';
    }
    prevTotal = item.total;
    const avg = item.days > 0 ? item.total / item.days : 0;
    return `
      <tr class="border-b hover:bg-gray-50">
        <td class="px-3 py-2 text-left">${item.year}</td>
        <td class="px-3 py-2 text-right">${Math.round(item.total)}</td>
        <td class="px-3 py-2 text-right">${avg.toFixed(1)}</td>
        <td class="px-3 py-2 text-right ${growth.startsWith('-') ? 'text-red-600' : 'text-green-600'}">${growth}</td>
      </tr>
    `;
  }).join('');

  // 绘制趋势图
  const ctx = document.getElementById('trendChart').getContext('2d');
  const labels = yearlyArray.map(item => item.year);
  const values = yearlyArray.map(item => item.total);

  if (trendChart) {
    trendChart.destroy();
  }

  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '年度总流量',
        data: values,
        borderColor: '#10B981',
        backgroundColor: 'rgba(16, 185, 129, 0.1)',
        borderWidth: 3,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: false,
          title: { display: true, text: '总流量 (万辆)' }
        }
      }
    }
  });
}

// ========== 📈 趋势分析页面辅助函数 ==========

// 渲染核心指标卡片
function renderCoreMetrics(data) {
  // 累计总流量
  const totalTraffic = data.reduce((sum, item) => sum + (item.traffic_volume || 0), 0);
  const totalEl = document.getElementById('totalTraffic');
  if (totalEl) totalEl.textContent = Math.round(totalTraffic).toLocaleString();
  
  const coverageEl = document.getElementById('dataCoverage');
  if (coverageEl) coverageEl.textContent = data.length;

  // 历史峰值
  const peakItem = data.reduce((max, item) => 
    (item.traffic_volume || 0) > (max.traffic_volume || 0) ? item : max
  , data[0]);
  const peakTrafficEl = document.getElementById('peakTraffic');
  if (peakTrafficEl) peakTrafficEl.textContent = peakItem.traffic_volume.toFixed(1);
  const peakInfoEl = document.getElementById('peakInfo');
  if (peakInfoEl) peakInfoEl.textContent = `${peakItem.year}年 ${peakItem.holiday || peakItem.date}`;

  // 年均增长率
  const yearlyData = {};
  data.forEach(item => {
    const year = item.year;
    if (!yearlyData[year]) yearlyData[year] = 0;
    yearlyData[year] += item.traffic_volume || 0;
  });
  const years = Object.keys(yearlyData).sort();
  const growthRateEl = document.getElementById('avgGrowthRate');
  if (years.length >= 2) {
    const firstYear = yearlyData[years[0]];
    const lastYear = yearlyData[years[years.length - 1]];
    const yearSpan = years[years.length - 1] - years[0];
    const cagr = (Math.pow(lastYear / firstYear, 1 / yearSpan) - 1) * 100;
    if (growthRateEl) growthRateEl.textContent = cagr.toFixed(1);
  } else {
    if (growthRateEl) growthRateEl.textContent = '-';
  }
}

// 渲染节假日分析
function renderHolidayAnalysis(data) {
  // 按节假日聚合
  const holidayData = {};
  data.forEach(item => {
    const holiday = item.holiday || '其他';
    if (!holidayData[holiday]) holidayData[holiday] = 0;
    holidayData[holiday] += item.traffic_volume || 0;
  });

  const holidayArray = Object.keys(holidayData).map(h => ({
    holiday: h,
    total: holidayData[h]
  })).sort((a, b) => b.total - a.total);

  const total = holidayArray.reduce((sum, h) => sum + h.total, 0);

  // 渲染排名表格
  const rankTbody = document.getElementById('holiday-rank-body');
  if (rankTbody) {
    rankTbody.innerHTML = holidayArray.slice(0, 7).map((h, i) => {
      const percent = ((h.total / total) * 100).toFixed(1);
      const rankColors = ['text-yellow-600', 'text-gray-500', 'text-orange-700'];
      const rankColor = rankColors[i] || 'text-gray-600';
      return `
        <tr class="border-b hover:bg-gray-50">
          <td class="px-3 py-2 font-bold ${rankColor}">#${i + 1}</td>
          <td class="px-3 py-2">${h.holiday}</td>
          <td class="px-3 py-2 text-right">${Math.round(h.total)}</td>
          <td class="px-3 py-2 text-right">${percent}%</td>
        </tr>
      `;
    }).join('');
  }

  // 渲染饼图
  const pieCtx = document.getElementById('holidayDistChart');
  if (pieCtx) {
    if (holidayPieChart) holidayPieChart.destroy();

// 渲染增长分析和数据质量
function renderGrowthAndQuality(data) {
  // 按年份聚合
  const yearlyData = {};
  data.forEach(item => {
    const year = item.year;
    if (!yearlyData[year]) yearlyData[year] = 0;
    yearlyData[year] += item.traffic_volume || 0;
  });

  const years = Object.keys(yearlyData).sort();
  const yearlyArray = years.map(y => ({ year: parseInt(y), total: yearlyData[y] }));

  // 计算各年增长率
  const growthRates = [];
  for (let i = 1; i < yearlyArray.length; i++) {
    const rate = ((yearlyArray[i].total - yearlyArray[i - 1].total) / yearlyArray[i - 1].total) * 100;
    growthRates.push({ year: yearlyArray[i].year, rate });
  }

  if (growthRates.length > 0) {
    const highest = growthRates.reduce((max, g) => g.rate > max.rate ? g : max, growthRates[0]);
    const lowest = growthRates.reduce((min, g) => g.rate < min.rate ? g : min, growthRates[0]);
    
    const highestEl = document.getElementById('highestGrowthYear');
    const lowestEl = document.getElementById('lowestGrowthYear');
    if (highestEl) highestEl.textContent = `${highest.year}年 (${highest.rate.toFixed(1)}%)`;
    if (lowestEl) lowestEl.textContent = `${lowest.year}年 (${lowest.rate.toFixed(1)}%)`;

    // 判断增长趋势
    const avgRate = growthRates.reduce((sum, g) => sum + g.rate, 0) / growthRates.length;
    let trendText, trendClass;
    if (avgRate > 10) {
      trendText = '🚀 高速增长';
      trendClass = 'text-green-600';
    } else if (avgRate > 0) {
      trendText = '📈 稳步增长';
      trendClass = 'text-blue-600';
    } else if (avgRate > -5) {
      trendText = '📉 小幅下降';
      trendClass = 'text-orange-600';
    } else {
      trendText = '⚠️ 明显下滑';
      trendClass = 'text-red-600';
    }
    const trendEl = document.getElementById('growthTrend');
    if (trendEl) {
      trendEl.textContent = trendText;
      trendEl.className = `font-bold ${trendClass}`;
    }

    // CAGR 复合增长率
    if (years.length >= 2) {
      const first = yearlyArray[0].total;
      const last = yearlyArray[yearlyArray.length - 1].total;
      const span = years[years.length - 1] - years[0];
      const cagr = (Math.pow(last / first, 1 / span) - 1) * 100;
      const cagrEl = document.getElementById('cagrRate');
      if (cagrEl) cagrEl.textContent = cagr.toFixed(1) + '%';
    }
  }

  // 数据质量统计
  const startYear = Math.min(...years);
  const endYear = Math.max(...years);
  const yearCount = endYear - startYear + 1;
  const actualYears = years.length;
  const completeness = (actualYears / yearCount * 100).toFixed(0);

  const startYearEl = document.getElementById('startYear');
  const endYearEl = document.getElementById('endYear');
  const yearCountEl = document.getElementById('yearCount');
  const completenessEl = document.getElementById('dataCompleteness');

  if (startYearEl) startYearEl.textContent = startYear;
  if (endYearEl) endYearEl.textContent = endYear;
  if (yearCountEl) yearCountEl.textContent = actualYears + ' 年';
  if (completenessEl) completenessEl.textContent = completeness + '%';
}

// 渲染节假日年度增长趋势
function renderHolidayTrend(data, holidayFilter) {
  // 按节假日+年份聚合
  const holidayYearData = {};
  const allHolidays = new Set();
  const allYears = new Set();

  data.forEach(item => {
    const holiday = item.holiday || '其他';
    const year = item.year;
    const key = `${holiday}-${year}`;
    if (!holidayYearData[key]) holidayYearData[key] = 0;
    holidayYearData[key] += item.traffic_volume || 0;
    allHolidays.add(holiday);
    allYears.add(year);
  });

  const years = Array.from(allYears).sort();
  const holidays = Array.from(allHolidays).filter(h => h !== '其他');

  const datasets = [];
  const colors = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#06B6D4'];

  if (holidayFilter === 'all') {
    // 显示所有主要节假日对比
    holidays.slice(0, 6).forEach((holiday, i) => {
      const values = years.map(y => holidayYearData[`${holiday}-${y}`] || 0);
      datasets.push({
        label: holiday,
        data: values,
        borderColor: colors[i % colors.length],
        backgroundColor: 'transparent',
        borderWidth: 2,
        tension: 0.3
      });
    });
  } else {
    // 显示单个节假日的详细趋势
    const values = years.map(y => holidayYearData[`${holidayFilter}-${y}`] || 0);
    datasets.push({
      label: holidayFilter + ' 流量',
      data: values,
      borderColor: '#3B82F6',
      backgroundColor: 'rgba(59, 130, 246, 0.1)',
      borderWidth: 3,
      fill: true,
      tension: 0.3
    });
  }

  const ctx = document.getElementById('holidayTrendChart');
  if (ctx) {
    if (holidayTrendChart) holidayTrendChart.destroy();
    holidayTrendChart = new Chart(ctx.getContext('2d'), {
      type: 'line',
      data: {
        labels: years.map(y => y + '年'),
        datasets
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top', labels: { fontSize: 11 } }
        },
        scales: {
          y: {
            beginAtZero: false,
            title: { display: true, text: '流量 (万辆)' }
          }
        }
      }
    });
  }
}

// 初始化地图
async function initHolidayMap() {
  console.log('开始初始化地图...');
  
  const container = document.getElementById('holidayMapContainer');
  if (!container) {
    console.error('地图容器不存在');
    setTimeout(initHolidayMap, 200);
    return;
  }
  
  // 确保容器有明确的高度
  container.style.height = '500px';
  container.style.width = '100%';
  container.style.minHeight = '500px';
  
  // 如果已存在，先销毁并清理所有资源
  if (holidayMap) {
    try { 
      // 清除所有连线
      flowPolylines.forEach(line => {
        try { line.setMap(null); } catch(e) {}
      });
      flowPolylines = [];
      
      // 清除所有粒子
      flowAnimations.forEach(anim => {
        anim.particles.forEach(p => {
          try { p.marker.setMap(null); } catch(e) {}
        });
      });
      flowAnimations = [];
      
      // 清除动画定时器
      if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
      }
      
      holidayMap.destroy(); 
    } catch(e) {}
    holidayMap = null;
  } else if (animationInterval) {
    clearInterval(animationInterval);
    animationInterval = null;
  }

  // 检查高德地图是否加载
  if (typeof AMap === 'undefined') {
    console.error('高德地图 API 未加载，等待重试...');
    container.innerHTML = 
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;flex-direction:column;"><div style="margin-bottom:10px;">🔄 地图加载中...</div><div style="font-size:12px;">正在加载高德地图，请稍候...</div></div>';
    setTimeout(initHolidayMap, 1000);
    return;
  }

  try {
    console.log('创建高德地图实例...');
    
    // 初始化高德地图，中心为山东省
    // 使用明确的图层配置确保底图正常显示
    holidayMap = new AMap.Map(container, {
      center: [118.2, 36.4], // [经度, 纬度]
      zoom: 7,
      viewMode: '2D',
      zooms: [6, 12],
      resizeEnable: true,
      // 显式启用默认图层
      layers: [new AMap.TileLayer()]
    });
    
    console.log('地图实例创建成功');

    // 强制地图刷新（解决底图不显示问题）
    setTimeout(() => {
      if (holidayMap) {
        holidayMap.resize();
        holidayMap.setZoom(holidayMap.getZoom());
        console.log('地图已强制刷新');
      }
    }, 300);

    // 地图加载完成后渲染数据
    holidayMap.on('complete', async () => {
      console.log('地图渲染完成，开始加载数据...');
      try {
        const citiesRes = await fetch(`${API_BASE}/city-flow/cities`);
        const citiesData = await citiesRes.json();
        
        if (citiesData.success) {
          renderCityMarkers(citiesData.data);
          await updateMapData();
        }
      } catch (err) {
        console.error('加载地图数据失败:', err);
      }
    });
    
    // 添加错误监听
    holidayMap.on('error', (err) => {
      console.error('地图错误:', err);
    });
  } catch (err) {
    console.error('地图初始化失败:', err);
    container.innerHTML = 
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;flex-direction:column;"><div style="margin-bottom:10px;">❌ 地图加载失败</div><div style="font-size:12px;">错误: ' + err.message + '</div><button onclick="initHolidayMap()" style="margin-top:10px;padding:5px 15px;background:#3B82F6;color:#fff;border:none;border-radius:4px;cursor:pointer;">点击重试</button></div>';
  }
}

// 渲染城市标记
function renderCityMarkers(cities) {
  // 清除旧标记
  Object.values(cityMarkers).forEach(item => {
    if (item.marker) {
      try { item.marker.setMap(null); } catch(e) {}
    }
  });
  cityMarkers = {};

  cities.forEach(city => {
    const marker = new AMap.Marker({
      position: [city.lng, city.lat],
      title: city.name,
      content: '<div class="city-marker-default"></div>',
      offset: new AMap.Pixel(-8, -8)
    });

    marker.setMap(holidayMap);
    marker.on('click', () => highlightCityFlow(city.name));
    cityMarkers[city.name] = { marker, data: city };
  });
}

async function updateMapData() {

  const holiday = document.getElementById('mapHolidaySelect').value;
  const flowType = document.getElementById('mapFlowTypeSelect').value;
  const display = document.getElementById('mapDisplaySelect').value;

  try {
    let url = `${API_BASE}/city-flow/data?year=${year}`;
    if (holiday) url += `&holiday=${encodeURIComponent(holiday)}`;
    
    const res = await fetch(url);
    const result = await res.json();
    
    if (result.success) {
      currentMapFlowData = result.data;
      if (selectedCityForFilter) {
        renderFilteredFlowLines(selectedCityForFilter, flowType, display);
      } else {
        renderFlowLines(result.data, flowType, display);
      }
      renderFlowTable(result.data);
    }
  } catch (err) {
    console.error('更新地图数据失败:', err);
  }
}

// 生成贝塞尔曲线路径
function generateBezierPath(fromLng, fromLat, toLng, toLat, curvature = 0.3) {
  // 计算中点
  const midLng = (fromLng + toLng) / 2;
  const midLat = (fromLat + toLat) / 2;
  
  // 计算垂直方向的偏移（用于贝塞尔曲线控制点）
  const dx = toLng - fromLng;
  const dy = toLat - fromLat;
  const len = Math.sqrt(dx * dx + dy * dy);
  
  // 垂直方向向量
  const perpX = -dy / len * curvature * len;
  const perpY = dx / len * curvature * len;
  
  // 控制点（在连线的中垂线上）
  const ctrlLng = midLng + perpX;
  const ctrlLat = midLat + perpY;
  
  // 生成贝塞尔曲线上的点（二次贝塞尔曲线）
  const path = [];
  const steps = 50;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    // 二次贝塞尔曲线公式: B(t) = (1-t)²P0 + 2(1-t)tP1 + t²P2
    const lng = (1-t)*(1-t)*fromLng + 2*(1-t)*t*ctrlLng + t*t*toLng;
    const lat = (1-t)*(1-t)*fromLat + 2*(1-t)*t*ctrlLat + t*t*toLat;
    path.push([lng, lat]);
  }
  
  return path;
}

// 创建流动粒子
function createFlowParticles(polyline, flowAmount, color, speed) {
  const particles = [];
  const particleCount = Math.min(5, Math.floor(flowAmount / 500000) + 1);
  
  for (let i = 0; i < particleCount; i++) {
    const particle = {
      progress: i / particleCount, // 粒子在曲线上的位置 (0-1)
      speed: speed * (0.8 + Math.random() * 0.4), // 随机速度
      color: color,
      size: 3 + Math.random() * 2
    };
    particles.push(particle);
  }
  
  return particles;
}

// 更新粒子位置
function updateParticlePositions() {
  if (!holidayMap) return;
  
  flowAnimations.forEach(anim => {
    anim.particles.forEach(p => {
      p.progress += p.speed * 0.005;
      if (p.progress > 1) p.progress = 0;
      
      // 计算当前位置
      const path = anim.path;
      const idx = Math.floor(p.progress * (path.length - 1));
      const nextIdx = Math.min(idx + 1, path.length - 1);
      const t = (p.progress * (path.length - 1)) - idx;
      
      const lng = path[idx][0] + (path[nextIdx][0] - path[idx][0]) * t;
      const lat = path[idx][1] + (path[nextIdx][1] - path[idx][1]) * t;
      
      if (p.marker) p.marker.setPosition([lng, lat]);
    });
  });
}

// 渲染流量连线和粒子动画
function renderFlowLines(data, flowType, display) {
  // 清除旧连线和动画
  flowPolylines.forEach(line => {
    try { line.setMap(null); } catch(e) {}
  });
  flowAnimations.forEach(anim => {
    anim.particles.forEach(p => {
      try { p.marker.setMap(null); } catch(e) {}
    });
  });
  flowPolylines = [];
  flowAnimations = [];
  
  if (animationInterval) {
    clearInterval(animationInterval);
    animationInterval = null;
  }

  // 按城市汇总流量
  const cityFlows = {};
  data.forEach(item => {
    const city = item.cityName;
    if (!cityFlows[city]) {
      cityFlows[city] = {
        city,
        highway: item.highwayDeparture || 0,
        railway: item.railDeparture || 0  // 修正字段名：railwayDeparture → railDeparture
      };
    } else {
      cityFlows[city].highway += item.highwayDeparture || 0;
      cityFlows[city].railway += item.railDeparture || 0;  // 修正字段名
    }
  });

  // 获取最大流量用于计算线条粗细
  const maxFlow = Math.max(...Object.values(cityFlows).map(f => f.highway + f.railway));

  // ========== 1. 渲染城市间连线 ==========
  const activeAnimations = [];
  
  let renderedLines = 0;
  
  cityConnections.forEach(conn => {
    // 兼容性处理：尝试带"市"和不带"市"两种形式
    const findCity = (name) => {
      return cityMarkers[name] || cityMarkers[name.replace(/市$/, '')] || cityMarkers[name + '市'];
    };
    const findFlow = (name) => {
      return cityFlows[name] || cityFlows[name.replace(/市$/, '')] || cityFlows[name + '市'];
    };
    
    const fromCity = findCity(conn.from);
    const toCity = findCity(conn.to);
    const fromFlow = findFlow(conn.from);
    const toFlow = findFlow(conn.to);
    
    if (!fromCity || !toCity || !fromFlow || !toFlow) return;
    renderedLines++;
    
    // 使用真实铁路数据
    const fromRailway = fromFlow.railway;
    const toRailway = toFlow.railway;
    
    const avgHighwayFlow = (fromFlow.highway + toFlow.highway) / 2;
    const avgRailwayFlow = (fromRailway + toRailway) / 2;
    const avgFlow = (avgHighwayFlow + avgRailwayFlow) / 2;
    const flowRatio = Math.min(1, avgFlow / maxFlow);
    
    // 线条粗细（4-10像素）- 加粗确保可见
    const strokeWeight = 5 + Math.floor(flowRatio * 7);
    
    // 动画速度（根据流量）
    const animationSpeed = 0.5 + flowRatio * 1.5;
    
    // ========== 高速连线（蓝色）==========
    if (flowType === 'all' || flowType === 'highway') {
      // 贝塞尔曲线路径
      const highwayPath = generateBezierPath(
        fromCity.data.lng, fromCity.data.lat,
        toCity.data.lng, toCity.data.lat,
        0.15 // 曲率
      );
      
      // 根据流量动态调整样式
      const lineOpacity = 0.5 + flowRatio * 0.4;
      const lineWeight = 3 + Math.floor(flowRatio * 5);
      
      if (display === 'all' || display === 'lines') {
        const highwayLine = new AMap.Polyline({
          path: highwayPath,
          strokeColor: '#2563EB', // 更深更亮的蓝色
          strokeWeight: lineWeight,
          strokeOpacity: 0.9,
          lineJoin: 'round',
          lineCap: 'round',
          zIndex: 50
        });
        holidayMap.add(highwayLine);
        flowPolylines.push(highwayLine);
      }
      
      // 添加高速流动粒子
      if (display === 'all' || display === 'animation') {
        const highwayParticles = createFlowParticles(
          { path: highwayPath }, avgHighwayFlow * conn.highwayRatio, '#60A5FA', animationSpeed
        );
        
        highwayParticles.forEach(p => {
          const idx = Math.floor(p.progress * (highwayPath.length - 1));
          p.marker = new AMap.Marker({
            position: highwayPath[idx],
            content: '<div class="particle-blue"></div>',
            offset: new AMap.Pixel(-4, -4)
          });
          p.marker.setMap(holidayMap);
        });
        
        activeAnimations.push({ path: highwayPath, particles: highwayParticles });
      }
    }
    
    // ========== 铁路连线（绿色）==========
    if (flowType === 'all' || flowType === 'railway') {
      // 贝塞尔曲线路径 - 反向曲率避免与高速线重叠
      const railwayPath = generateBezierPath(
        fromCity.data.lng, fromCity.data.lat,
        toCity.data.lng, toCity.data.lat,
        -0.15 // 反向曲率
      );
      
      // 根据流量动态调整样式
      const lineOpacity = 0.5 + flowRatio * 0.4;
      const lineWeight = 3 + Math.floor(flowRatio * 5);
      
      if (display === 'all' || display === 'lines') {
        const railwayLine = new AMap.Polyline({
          path: railwayPath,
          strokeColor: '#059669', // 更鲜艳的翠绿色
          strokeWeight: lineWeight,
          strokeOpacity: 0.9,
          lineJoin: 'round',
          lineCap: 'round',
          zIndex: 49,
          strokeStyle: 'dashed',
          strokeDasharray: [20, 12]
        });
        holidayMap.add(railwayLine);
        flowPolylines.push(railwayLine);
      }
      
      // 添加铁路流动粒子
      if (display === 'all' || display === 'animation') {
        const railwayParticles = createFlowParticles(
          { path: railwayPath }, avgRailwayFlow * conn.railwayRatio, '#34D399', animationSpeed
        );
        
        railwayParticles.forEach(p => {
          const idx = Math.floor(p.progress * (railwayPath.length - 1));
          p.marker = new AMap.Marker({
            position: railwayPath[idx],
            content: '<div class="particle-green"></div>',
            offset: new AMap.Pixel(-4, -4)
          });
          p.marker.setMap(holidayMap);
        });
        
        activeAnimations.push({ path: railwayPath, particles: railwayParticles });
      }
    }
  });
  
  flowAnimations = activeAnimations;
  
  // 启动动画循环
  if (flowAnimations.length > 0) {
    if (animationInterval) clearInterval(animationInterval);
    animationInterval = setInterval(updateParticlePositions, 50);
  }
  
  // 测试完成，移除强制测试线

  // ========== 2. 渲染城市流量标记（简化版本）==========
  Object.values(cityFlows).forEach(flow => {
    const cityInfo = Object.values(cityMarkers).find(m => m.data.name === flow.city);
    if (!cityInfo) return;
    
    // 保留原有标记，不重新创建（避免高德地图 API 错误）
  });
}

// 渲染流量汇总表格
function renderFlowTable(data) {
  const citySummary = {};
  
  data.forEach(item => {
    const city = item.cityName;
    if (!citySummary[city]) {
      citySummary[city] = {
        city,
        highwayDeparture: 0,
        highwayArrival: 0,
        railDeparture: 0,
        railArrival: 0
      };
    }
    citySummary[city].highwayDeparture += item.highwayDeparture || 0;
    citySummary[city].highwayArrival += item.highwayArrival || 0;
    citySummary[city].railDeparture += item.railDeparture || 0;
    citySummary[city].railArrival += item.railArrival || 0;
  });
  
  const sortedCities = Object.values(citySummary).map(item => ({
    ...item,
    totalFlow: item.highwayDeparture + item.highwayArrival + item.railDeparture + item.railArrival,
    netFlow: (item.highwayArrival + item.railArrival) - (item.highwayDeparture + item.railDeparture)
  })).sort((a, b) => b.totalFlow - a.totalFlow);
  
  const tbody = document.getElementById('flowTableBody');
  tbody.innerHTML = sortedCities.map((item, index) => `
    <tr class="border-b border-gray-100 hover:bg-blue-50 transition-colors">
      <td class="px-4 py-2 text-left font-bold ${index < 3 ? 'text-amber-600' : 'text-gray-600'}">${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}</td>
      <td class="px-4 py-2 text-left font-medium text-gray-800">${item.city}</td>
      <td class="px-4 py-2 text-right text-blue-600">${Math.round(item.highwayDeparture).toLocaleString()}</td>
      <td class="px-4 py-2 text-right text-blue-500">${Math.round(item.highwayArrival).toLocaleString()}</td>
      <td class="px-4 py-2 text-right text-green-600">${Math.round(item.railDeparture).toLocaleString()}</td>
      <td class="px-4 py-2 text-right text-green-500">${Math.round(item.railArrival).toLocaleString()}</td>
      <td class="px-4 py-2 text-right font-bold text-blue-700">${Math.round(item.totalFlow).toLocaleString()}</td>
      <td class="px-4 py-2 text-right font-bold ${item.netFlow >= 0 ? 'text-green-700' : 'text-red-600'}">${item.netFlow >= 0 ? '+' : ''}${Math.round(item.netFlow).toLocaleString()}</td>
    </tr>
  `).join('');
}

// 辅助函数:颜色变浅
function kgLightenColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.min(255, Math.max(0, (num >> 16) + amt));
  const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
  const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
  return '#' + [R, G, B].map(x => x.toString(16).padStart(2, '0')).join('');
}

let kgUploadedFile = null;

function kgInitUpload() {
  const uploadArea = document.getElementById('kgUploadArea');
  uploadArea.addEventListener('click', () => {
    document.getElementById('kgFileInput').click();
  });

  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });

  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });

  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) kgUploadFileOnly(files[0]);
  });

  document.getElementById('kgFileInput').addEventListener('change', () => {
    const fileInput = document.getElementById('kgFileInput');
    if (fileInput.files.length > 0) kgUploadFileOnly(fileInput.files[0]);
  });

  // 重置上传状态:每次重新渲染都重置,保证清空后可以重新上传
  if (!kgUploadedFile) {
    const parseBtn = document.getElementById('kgParseGraphBtn');
    const statusEl = document.getElementById('kgUploadStatus');
    if (parseBtn) parseBtn.style.display = 'none';
    if (statusEl) statusEl.textContent = '支持 txt/doc/docx/pdf/xlsx';
  }

  // 📌 当前选中的节点ID
  let kgSelectedNodeId = null;

  knowledgeGraphChart.on('click', function(params) {
    if (params.dataType === 'node') {
      kgShowEntityProperties(params.data);
      // ✅ 修复:点击只显示属性,不调用kgExpandNode重新渲染
      // kgExpandNode(params.data.id);

      // 🎯 选中高亮效果:点击节点后持续高亮该节点及其关联
      const nodeId = params.data.id;
      kgSelectedNodeId = nodeId;

      // 1. 先取消所有节点的选中状态
      const option = knowledgeGraphChart.getOption();
      const nodes = option.series[0].data;
      const links = option.series[0].links;

      nodes.forEach(node => {
        // 清除之前的选中样式
        node.itemStyle = node.itemStyle || {};
        delete node.itemStyle.borderColor;
        delete node.itemStyle.borderWidth;
        delete node.itemStyle.shadowBlur;
        delete node.itemStyle.shadowColor;
        delete node.label.fontWeight;
        delete node.symbolSizeScale;
      });

      links.forEach(link => {
        link.lineStyle = link.lineStyle || {};
        delete link.lineStyle.width;
        delete link.lineStyle.opacity;
      });

      // 2. 先把所有节点和连线变暗(未选中状态)
      nodes.forEach(node => {
        node.itemStyle = node.itemStyle || {};
        node.itemStyle.opacity = 0.2;  // 变暗
      });

      links.forEach(link => {
        link.lineStyle = link.lineStyle || {};
        link.lineStyle.opacity = 0.1;  // 连线几乎看不见
      });

      // 3. 找到当前点击的节点,高亮显示
      const selectedNode = nodes.find(n => n.id === nodeId || n.id === String(nodeId));
      if (selectedNode) {
        selectedNode.itemStyle = selectedNode.itemStyle || {};
        selectedNode.itemStyle.borderColor = '#ff6b6b';    // 红色边框
        selectedNode.itemStyle.borderWidth = 4;             // 加粗边框
        selectedNode.itemStyle.shadowBlur = 25;             // 发光效果
        selectedNode.itemStyle.shadowColor = '#ff6b6b';     // 红色光晕
        selectedNode.itemStyle.opacity = 1;                 // 完全可见
        selectedNode.label = selectedNode.label || {};
        selectedNode.label.fontWeight = 'bold';             // 文字加粗
      }

      // 4. 高亮所有关联的节点和连线
      const selectedIdStr = String(nodeId);
      links.forEach(link => {
        const sourceId = String(link.source);
        const targetId = String(link.target);

        // 如果这条连线与选中节点有关联
        if (sourceId === selectedIdStr || targetId === selectedIdStr) {
          // 高亮连线
          link.lineStyle = link.lineStyle || {};
          link.lineStyle.width = 4;       // 连线加粗
          link.lineStyle.opacity = 1;     // 完全不透明

          // 高亮另一端的节点
          const otherNodeId = sourceId === selectedIdStr ? targetId : sourceId;
          const otherNode = nodes.find(n => String(n.id) === otherNodeId);
          if (otherNode) {
            otherNode.itemStyle = otherNode.itemStyle || {};
            otherNode.itemStyle.shadowBlur = 18;
            otherNode.itemStyle.shadowColor = '#4ecdc4';  // 青绿色光晕表示关联
            otherNode.itemStyle.opacity = 1;              // 关联节点也完全可见
          }
        }
      });

      // 应用选中样式
      knowledgeGraphChart.setOption(option);
    } else {
      // 🎯 点击空白处:取消所有选中状态
      if (kgSelectedNodeId) {
        kgSelectedNodeId = null;
        const option = knowledgeGraphChart.getOption();
        const nodes = option.series[0].data;
        const links = option.series[0].links;

        // 清除所有节点样式
        nodes.forEach(node => {
          node.itemStyle = node.itemStyle || {};
          delete node.itemStyle.borderColor;
          delete node.itemStyle.borderWidth;
          delete node.itemStyle.shadowBlur;
          delete node.itemStyle.shadowColor;
          delete node.itemStyle.opacity;
          if (node.label) delete node.label.fontWeight;
        });

        // 清除所有连线样式
        links.forEach(link => {
          link.lineStyle = link.lineStyle || {};
          delete link.lineStyle.width;
          delete link.lineStyle.opacity;
        });

        knowledgeGraphChart.setOption(option);
      }
    }
  });


}

async function kgUploadFileOnly(file) {
  let uploadStatus = document.getElementById('kgUploadStatus');
  kgShowLoading(true);
  if (uploadStatus) uploadStatus.textContent = '正在上传: ' + file.name;

  // 保存文件引用,等待解析
  kgUploadedFile = file;

  // 模拟上传
  setTimeout(() => {
    kgShowLoading(false);
    if (uploadStatus) {
      uploadStatus.textContent = '✅ 文件已上传: ' + file.name;
    }
    kgShowToast('success', '文件上传成功,点击下方按钮解析并更新图谱');

    // 显示解析按钮
    const parseBtn = document.getElementById('kgParseGraphBtn');
    if (parseBtn) parseBtn.style.display = 'block';
  }, 800);
}

async function kgParseFileToGraph() {
  if (!kgUploadedFile) {
    kgShowToast('error', '没有可解析的文件,请先上传文件');
    return;
  }

  let uploadStatus = document.getElementById('kgUploadStatus');
  kgShowLoading(true);
  if (uploadStatus) uploadStatus.textContent = '正在解析: ' + kgUploadedFile.name;

  const formData = new FormData();
  formData.append('file', kgUploadedFile);

  try {
    const res = await fetch(`${API_BASE}/knowledge/upload`, {
      method: 'POST',
      body: formData
    });
    const result = await res.json();

    if (result.success) {
      kgShowToast('success', '解析成功,图谱已更新');
      if (uploadStatus) uploadStatus.textContent = '✅ 已解析: ' + kgUploadedFile.name + ' (' + result.data.entities.length + ' 个实体)';
      renderKnowledgeGraph();
      kgLoadDebugData();
      // 隐藏解析按钮
      const parseBtn = document.getElementById('kgParseGraphBtn');
      if (parseBtn) parseBtn.style.display = 'none';
    } else {
      kgShowToast('error', result.error || '解析失败');
      if (uploadStatus) uploadStatus.textContent = '❌ 解析失败: ' + result.error;
    }
    kgShowLoading(false);
  } catch (error) {
    console.error('Parse error:', error);

    if (uploadStatus) uploadStatus.textContent = '❌ 网络错误';
    kgShowLoading(false);
  }
}

// 按类型筛选实体
function kgApplyFilter() {
  const checkedTypes = [];
  document.querySelectorAll('.entity-type-checkbox').forEach(cb => {
    if (cb.checked) checkedTypes.push(cb.getAttribute('data-type'));
  });
  const enabledLevels = kgGetEnabledConfidenceLevels();

  if (checkedTypes.length === 0 || enabledLevels.size === 0) {
    kgCurrentNodes = [];
    kgCurrentLinks = [];
    renderKgCurrentGraph();
    setTimeout(() => knowledgeGraphChart.dispatchAction({ type: 'restore' }), 300);
    return;
  }

  // 从全量数据重新过滤，避免连续筛选导致越筛越少
  kgCurrentNodes = kgAllNodes.filter(n => checkedTypes.includes(n.type));
  const nodeIds = new Set(kgCurrentNodes.map(n => String(n.id)));

  kgCurrentLinks = kgAllLinks.filter(link => {
    const level = kgGetConfidenceLevel(link.confidence, link.label);
    return nodeIds.has(String(link.source)) && nodeIds.has(String(link.target)) && enabledLevels.has(level);
  });

  renderKgCurrentGraph();
  setTimeout(() => knowledgeGraphChart.dispatchAction({ type: 'restore' }), 300);
}

  const typeInfo = entityTypeNames[node.type];

  document.getElementById('kgEntityIcon').style.backgroundColor = color;

  const container = document.getElementById('kgPropertiesList');
  container.innerHTML = '';

  // 获取实体属性(后端返回的properties)
  const properties = node.properties || {};
  const baseColor = color;
  Object.entries(properties).forEach(([key, value], index) => {
    const propColor = kgLightenColor(baseColor, (index - 2) * 10);
    const div = document.createElement('div');
    div.className = 'kg-property-item';
    div.style.setProperty('--prop-color', propColor);

  // 查找该实体的所有关联
  const nodeIdStr = String(node.id);
  const relatedRelations = [];
  
  kgAllLinks.forEach(link => {
    const sourceId = String(link.source);
    const targetId = String(link.target);
    
    if (sourceId === nodeIdStr || targetId === nodeIdStr) {
      const otherNodeId = sourceId === nodeIdStr ? targetId : sourceId;
      const otherNode = kgAllNodes.find(n => String(n.id) === otherNodeId);
      if (otherNode) {
        relatedRelations.push({
          entity: otherNode,
          relation: link.label || '关联',
          direction: sourceId === nodeIdStr ? 'out' : 'in'
        });
      }
    }
  });
  
  if (relatedRelations.length > 0) {
    relationsDiv.innerHTML = `
      <h4 class="text-sm font-semibold text-gray-700 mb-3">🔗 关联实体 (${relatedRelations.length})</h4>
      <div class="space-y-2 max-h-64 overflow-y-auto">
        ${relatedRelations.map(r => {
          const typeInfo = entityTypeNames[r.entity.type] || { name: r.entity.type, color: '#95a5a6' };

          return `
            <div class="p-2 bg-gray-50 rounded-lg border border-gray-200">

                <span class="font-medium text-gray-800 text-sm">${r.entity.name}</span>
                <span class="text-xs text-gray-500">(${typeInfo.name})</span>
              </div>
              <div class="text-xs text-gray-600">
                <span class="text-blue-600">${arrowIcon}</span> ${r.relation}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  } else {
    relationsDiv.innerHTML = `
      <div class="text-sm text-gray-500 text-center py-2">
        暂无关联实体
      </div>
    `;
  }
  
  container.appendChild(relationsDiv);

function kgRenderDebugPanel() {
  const list = document.getElementById('kgDebugList');
  if (!list) return;
  const entityCount = document.getElementById('kgDebugEntityCount');
  const relationCount = document.getElementById('kgDebugRelationCount');
  if (entityCount) entityCount.textContent = kgDebugData.entities.length;

  const typeFilter = document.getElementById('kgDebugTypeFilter')?.value || 'all';
  const typeName = (t) => entityTypeNames[t]?.name || t || '未知';
  const safe = (v) => String(v ?? '').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
  if (kgDebugTab === 'entities') {
    const rows = kgDebugData.entities.filter(e => typeFilter === 'all' || e.type === typeFilter);
    list.innerHTML = rows.length ? rows.map(e => {
      const props = e.properties ? Object.entries(e.properties).map(([k,v]) => `${safe(k)}=${safe(v)}`).join('；') : '';
      return `<div class="kg-debug-item entity"><b>${safe(e.name)}</b><div class="kg-debug-meta">类型：${typeName(e.type)} ｜ ID：${e.id}</div>${props ? `<div class="kg-debug-evidence">属性：${props}</div>` : ''}</div>`;
    }).join('') : '<div class="kg-debug-meta">暂无实体</div>';
  } else {
    const rows = kgDebugData.relations.filter(r => typeFilter === 'all' || r.fromType === typeFilter || r.toType === typeFilter);
    list.innerHTML = rows.length ? rows.map(r => {
      const conf = r.confidence != null ? ` ｜ 置信度：${Number(r.confidence).toFixed(2)}` : '';
      const level = kgGetConfidenceLevel(r.confidence, r.label);
      const levelName = level === 'high' ? '高置信' : (level === 'medium' ? '中置信' : '低置信/弱关联');
      return `<div class="kg-debug-item relation"><b>${safe(r.fromName || r.source)} → ${safe(r.label)} → ${safe(r.toName || r.target)}</b><div class="kg-debug-meta">${typeName(r.fromType)} → ${typeName(r.toType)}${conf} ｜ ${levelName}</div>${r.evidence ? `<div class="kg-debug-evidence">证据：${safe(r.evidence)}</div>` : ''}</div>`;
    }).join('') : '<div class="kg-debug-meta">暂无关系</div>';
  }
}

async function renderKnowledgeGraph() {
  try {
    // 第一步:先清空所有原有数据(全局+图表)
    kgAllNodes = [];
    kgAllLinks = [];
    kgCurrentNodes = [];
    kgCurrentLinks = [];
    nodeFrequency = {};
    topNodeIds = [];

    // 清空图表实例中缓存的数据
    if (knowledgeGraphChart) {
      knowledgeGraphChart.clear();
    }

    const res = await fetch(`${API_BASE}/knowledge/graph`);
    const result = await res.json();
    if (!result.success) {
      console.error('获取图谱失败:', result.error);
      return;
    }

    // 赋值新数据
    kgAllNodes = result.data.nodes;
    kgAllLinks = result.data.links;

    // 获取所有实体出现次数,用于调整节点大小
    nodeFrequency = {};
    kgAllLinks.forEach(link => {
      nodeFrequency[String(link.source)] = (nodeFrequency[String(link.source)] || 0) + 1;
      nodeFrequency[String(link.target)] = (nodeFrequency[String(link.target)] || 0) + 1;
    });

    // 如果没有统计数据,每个节点至少算1次
    kgAllNodes.forEach(node => {
      if (!nodeFrequency[String(node.id)]) nodeFrequency[String(node.id)] = 1;
    });

    // 更新左侧实体类型筛选列表:只显示当前图谱中实际存在的类型
    kgUpdateTypeFilter();

    // 初始加载就显示**所有实体**和**所有关系**(不限制数量)
    const initialNodeIds = new Set(kgAllNodes.map(n => String(n.id)));

    console.log('初始加载: 节点', initialNodeIds.size, '连线', kgAllLinks.length);

    // 构建初始显示数据(ID类型匹配:string)
    kgCurrentNodes = kgAllNodes;
    kgCurrentLinks = kgAllLinks;

    // 渲染初始图谱
    renderKgCurrentGraph();
    const dbg = document.getElementById('kgDebugBody');
    if (dbg && dbg.style.display === 'block') kgLoadDebugData();

}

// 更新左侧实体类型筛选列表:只显示当前图谱中实际存在的类型
function kgUpdateTypeFilter() {
  const container = document.getElementById('entityTypeCheckboxes');
  if (!container) return;

  // 收集当前图谱中所有实际存在的实体类型
  const existingTypes = new Set();
  kgAllNodes.forEach(node => existingTypes.add(node.type));

  let html = '';
  // 遍历所有预定义类型配置,只显示存在的类型
  Object.entries(entityTypeNames).forEach(([type, info]) => {
    if (existingTypes.has(type)) {
      html += `
        <label class="flex items-center gap-2 p-2 bg-white rounded cursor-pointer hover:bg-gray-50">
          <input type="checkbox" class="entity-type-checkbox" data-type="${type}" checked>
          <div class="kg-legend-color" style="background-color: ${info.color}"></div>
          <span>${info.name}</span>
        </label>
      `;

  });

    html = '<div class="p-3 text-sm text-gray-500 italic">图谱为空,请上传文件</div>';
  }

  container.innerHTML = html;
}



function kgGetConfidenceLevel(confidence, label) {
  const c = Number(confidence);
  if (label && /文档关联|时间线索|周边地点|同一\/相关|事件链路/.test(label)) return 'low';
  if (!Number.isFinite(c)) return 'medium';
  if (c >= 0.70) return 'high';
  if (c >= 0.55) return 'medium';
  return 'low';
}

function kgGetConfidenceStyle(level) {
  if (level === 'high') return { color: 'rgba(15, 118, 110, 0.78)', width: 3.2, type: 'solid', curveness: 0.08 };
  if (level === 'medium') return { color: 'rgba(37, 99, 235, 0.55)', width: 2.1, type: 'solid', curveness: 0.12 };
  return { color: 'rgba(148, 163, 184, 0.42)', width: 1.3, type: 'dashed', curveness: 0.18 };
}

function kgGetEnabledConfidenceLevels() {
  const boxes = document.querySelectorAll('.kg-confidence-checkbox');
  if (!boxes || boxes.length === 0) return new Set(['high', 'medium', 'low']);
  const enabled = new Set();
  boxes.forEach(cb => { if (cb.checked) enabled.add(cb.getAttribute('data-level')); });
  return enabled;
}

// 渲染当前显示的图谱
function renderKgCurrentGraph() {
  // 根据总实体数计算实体大小缩放比例
  const totalNodes = kgAllNodes.length;
  let symbolSize = 25; // 基础大小
  if (totalNodes < 20) {
    symbolSize = 25; // 100%: 25px
  } else if (totalNodes < 50) {
    symbolSize = 18; // 70%: 18px ≈ 25 * 0.7
  } else {
    symbolSize = 12; // 50%: 12px ≈ 25 * 0.5
  }

  // 根据节点频率调整单个节点大小(主实体更大)
  const processedNodes = kgCurrentNodes.map(node => {
    const freq = nodeFrequency[String(node.id)] || 1;
    // 频率越高越大,基础缩放加上频率调整
    const nodeSize = symbolSize * (1 + Math.min(freq / 10, 0.5));
    return {
      ...node,
      symbolSize: nodeSize,
      itemStyle: {
        color: entityTypeNames[node.type]?.color || '#999'
      }
    };
  });

  // 转换为ECharts Force布局格式
  const option = {
    backgroundColor: '#ffffff',
    tooltip: {
      backgroundColor: 'rgba(255, 255, 255, 0.95)',
      borderColor: '#ccc',
      borderWidth: 1,
      formatter: (params) => {
        if (params.dataType === 'node') {
          const node = params.data;
          const typeName = entityTypeNames[node.type]?.name || node.type;
          return `
            <div style="color: #333;">
              <strong>${node.name}</strong><br/>
              类型: ${typeName}
            </div>
          `;
        }
        if (params.dataType === 'edge') {
          const d = params.data;
          const levelName = d.confidenceLevel === 'high' ? '高置信强关系' : (d.confidenceLevel === 'medium' ? '中置信推断关系' : '低置信弱关联');
          const conf = d.confidence != null ? Number(d.confidence).toFixed(2) : '未知';
          return `<div style="color: #333;"><strong>${d.label?.formatter || d.label || ''}</strong><br/>置信度: ${conf}<br/>层级: ${levelName}</div>`;
        }
      }
    },
    series: [{
      type: 'graph',
      layout: 'force',
      roam: true,       // ✅ 滚轮缩放 + 画布平移
      draggable: true,  // ✅ 节点可拖拽 (最关键)
      force: {
        repulsion: 250,
        edgeLength: 120,
        gravity: 0.2,
        friction: 0.9      // 高摩擦,拖拽后不动
      },
      layoutAnimation: false,  // ✅ 拖拽后不重新计算布局
      animation: false,        // ✅ 完全关闭动画,避免抖动
      animationDurationUpdate: 0,
      // 鼠标悬停高亮相邻
      emphasis: {
        focus: 'adjacency',
        lineStyle: {
          width: 3
        }
      },
      data: (function() {
        // 根据总实体数动态计算**目标固定像素直径**
        const totalNodes = kgCurrentNodes.length;
        let baseSymbolSize;
        if (totalNodes < 20) {
          baseSymbolSize = 25;      // <20 → 100% → 目标 25px
        } else if (totalNodes <= 50) {
          baseSymbolSize = 18;      // 20-50 → 70% → 目标 18px
        } else {
          baseSymbolSize = 12;      // >50 → 50% → 目标 12px
        }
        window.kgTargetBaseSize = baseSymbolSize; // 保存供修正
        const baseFontSize = Math.max(8, Math.round(baseSymbolSize * 0.4));
        window.kgTargetBaseFontSize = baseFontSize;

        // 初始渲染先按目标大小,之后缩放事件会修正
        return kgCurrentNodes.map(node => {
          const frequency = nodeFrequency && nodeFrequency[String(node.id)] ? nodeFrequency[String(node.id)] : 1;
          const isTop = topNodeIds && topNodeIds.includes(String(node.id));
          const scale = frequency >= 2 || isTop ? 1.3 : 1.0;
          const symbolSize = Math.round(baseSymbolSize * scale);
          return {
            id: node.id,
            name: node.name,
            type: node.type,
            draggable: true, // 🔧 关键:每个节点单独设置可拖拽
            symbolSize: symbolSize,
            label: {
              show: true,
              position: 'inside',
              fontSize: Math.max(8, Math.round(baseFontSize * scale)),
              fontWeight: 500,
              color: '#ffffff'
            },
            itemStyle: {
              color: entityTypeNames[node.type]?.color || '#999'
            }
          };
        });
      })(),
      links: kgCurrentLinks.map(link => {
        const level = kgGetConfidenceLevel(link.confidence, link.label);
        const style = kgGetConfidenceStyle(level);
        const confText = Number.isFinite(Number(link.confidence)) ? ` (${Number(link.confidence).toFixed(2)})` : '';
        return {
          source: String(link.source),
          target: String(link.target),
          confidence: link.confidence,
          confidenceLevel: level,
          label: {
            show: level !== 'low',
            formatter: link.label,
            color: level === 'high' ? '#0f766e' : (level === 'medium' ? '#2563eb' : '#94a3b8'),
            fontSize: level === 'high' ? 12 : 10
          },
          tooltip: { formatter: `${link.label}${confText}<br/>置信层级：${level === 'high' ? '高' : level === 'medium' ? '中' : '低'}` },
          lineStyle: style
        };
      })
    }]
  };

  knowledgeGraphChart.setOption(option, true);

  // 初始就给所有节点加上 fixed,布局完直接不动,不晃了
  // 用户可以手动拖拽改变位置,拖拽后依然保持 fixed,不会弹回去

  // 修正节点大小,保持像素固定
  function kgFixNodeSize() {
    if (!knowledgeGraphChart || !window.kgTargetBaseSize) return;

    const option = knowledgeGraphChart.getOption();
    if (!option.series || !option.series[0] || !option.series[0].data) return;

    // 获取当前缩放比例
    let scale = 1;
    try {
      const zr = knowledgeGraphChart.getZr();
      if (zr._zoom !== undefined) {
        scale = zr._zoom;
      }
    } catch(e) {
      scale = 1;
    }

    const baseSize = window.kgTargetBaseSize;
    const baseFont = window.kgTargetBaseFontSize;

    // 每个节点根据缩放比例反向修正:scale越大 → symbolSize越小,保持屏幕像素不变
    option.series[0].data.forEach(node => {
      // 计算这个节点原本应该多大(相对于baseSize的比例)
      let ratio;
      if (node.originalRatio) {
        ratio = node.originalRatio; // 使用保存的原始比例
      } else {
        ratio = node.symbolSize / baseSize;
        node.originalRatio = ratio; // 保存初始比例
      }

      const correctedBase = baseSize / scale;
      const correctedFont = baseFont / scale;
      node.symbolSize = Math.round(correctedBase * ratio);
      if (node.label && node.label.fontSize) {
        node.label.fontSize = Math.max(6, Math.round(correctedFont * ratio));
      }

      // 始终保持 fixed = true,停止迭代晃动
      // 用户拖拽后位置会保存在 x,y,fixed 保持它不动
      node.fixed = true;
    });

    knowledgeGraphChart.setOption(option, { notMerge: false });
  }

  // 初始所有节点 fixed,然后修正大小
  option.series[0].data.forEach(node => {
    node.fixed = true;
  });
  knowledgeGraphChart.setOption(option, { notMerge: false });

  // 初始修正
  setTimeout(kgFixNodeSize, 100);

  // 每次缩放渲染后重新修正大小(但不碰位置,位置保持用户拖拽结果)
  knowledgeGraphChart.on('rendered', kgFixNodeSize);
}


// 点击节点扩展加载更多关联
function kgExpandNode(entityId) {
  const entityIdStr = String(entityId);

  // 如果这个节点已经添加过了,只需要重置视图
  if (kgCurrentNodes.find(n => n.id === entityIdStr)) {
    setTimeout(() => knowledgeGraphChart.dispatchAction({ type: 'restore' }), 300);
    return;
  }

  // 添加这个节点本身
  const nodeToAdd = kgAllNodes.find(n => n.id === entityIdStr);
  if (nodeToAdd) {
    kgCurrentNodes.push(nodeToAdd);
  }

  // 添加这个节点和已显示节点之间的所有连线
  kgAllLinks.forEach(link => {
    const sourceId = String(link.source);
    const targetId = String(link.target);

    // 检查是否至少一端已经显示
    const sourceExists = kgCurrentNodes.find(n => n.id === sourceId);
    const targetExists = kgCurrentNodes.find(n => n.id === targetId);

    // 如果一端是点击的节点,另一端已经显示 → 添加这条连线
    if ((sourceId === entityIdStr && targetExists) ||
        (targetId === entityIdStr && sourceExists)) {
      // 确认另一端的节点已经添加,如果没添加也加上
      if (sourceId === entityIdStr && !targetExists) {
        const node = kgAllNodes.find(n => n.id === targetId);
        if (node) kgCurrentNodes.push(node);
      }
      if (targetId === entityIdStr && !sourceExists) {
        const node = kgAllNodes.find(n => n.id === sourceId);
        if (node) kgCurrentNodes.push(node);
      }
      // 添加连线
      const hasLink = kgCurrentLinks.find(l => String(l.source) === sourceId && String(l.target) === targetId);
      if (!hasLink) {
        kgCurrentLinks.push(link);
      }
    }
  });

  // 重新渲染
  renderKgCurrentGraph();

  // 重置视图让新节点都可见
  setTimeout(() => knowledgeGraphChart.dispatchAction({ type: 'restore' }), 500);
}
