// 加载知识实体(按类型分组,分页懒加载)
// mode: 'current' = 当前上传文件(工作区模式), 'history' = 全部历史数据
async function loadKnowledgeEntities(keyword, mode = 'current') {
  const container = document.getElementById('searchResult');
  container.innerHTML = '<div class="text-gray-500">加载中...</div>';

  try {
    // 根据模式选择不同的API
    let apiUrl = mode === 'current' ? `${API_BASE}/knowledge/entities` : `${API_BASE}/knowledge/history/entities`;
    const res = await fetch(apiUrl);
    const result = await res.json();
    if (!result.success) {
      container.innerHTML = `<div class="text-red-500">加载失败: ${result.error}</div>`;
      return;
    }

    const grouped = result.data;
    window.currentSearchMode = mode;  // 保存当前模式供后续使用
    let html = '';

    // 遍历每种实体类型,默认折叠,显示前10个
    Object.entries(grouped).forEach(([type, entities]) => {
      // 筛选包含关键词的
      const filtered = keyword ? entities.filter(e => e.name && e.name.toLowerCase && e.name.toLowerCase().includes(keyword.toLowerCase())) : entities;
      if (filtered.length === 0) return;

      const typeInfo = entityTypeNames[type] || { name: type, color: '#999' };
      const displayName = typeInfo.name;
      const color = typeInfo.color;
      const total = filtered.length;
      const defaultShow = filtered.slice(0, 10);
      const hasMore = filtered.length > 10;

      html += `
        <div class="mb-3 border border-gray-200 rounded-lg overflow-hidden">
          <button class="type-header w-full px-3 py-2 flex justify-between items-center bg-gray-50 hover:bg-gray-100 transition-colors" data-type="${type}">
            <span><span class="inline-block w-3 h-3 rounded-full mr-2" style="background-color: ${color}"></span> ${displayName} <span class="text-gray-500 text-sm">(${total} 个实体)</span></span>
            <span class="text-gray-400">${hasMore ? '▼' : ''}</span>
          </button>
          <div class="type-content px-3 py-2 hidden" id="content-${type}">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
              ${defaultShow.map(e => `
                <button class="entity-item px-2 py-1.5 border border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 text-left transition-colors" data-entity-id="${e.id}" data-entity-name="${e.name}" data-entity-type="${e.entity_type}">
                  <div class="font-medium text-sm">${e.name}</div>
                </button>
              `).join('')}
            </div>
            ${hasMore ? `<button class="load-more-btn mt-2 px-3 py-1 text-sm text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-50" data-type="${type}" data-offset="10">加载更多</button>` : ''}
          </div>
        </div>
      `;
    });

    if (!html) {
      container.innerHTML = '<div class="text-gray-500">没有找到匹配的实体</div>';
    } else {
      container.innerHTML = html;

      // 绑定折叠/展开事件
      document.querySelectorAll('.type-header').forEach(header => {
        header.addEventListener('click', () => {
          const type = header.getAttribute('data-type');
          const content = document.getElementById(`content-${type}`);
          if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            header.querySelector('span:last-child').textContent = '▲';
          } else {
            content.classList.add('hidden');
            header.querySelector('span:last-child').textContent = '▼';
          }
        });
      });

      // 绑定加载更多
      document.querySelectorAll('.load-more-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const type = btn.getAttribute('data-type');
          const offset = parseInt(btn.getAttribute('data-offset'));
          const allEntities = grouped[type];
          if (!allEntities) {
            console.error('找不到类型实体:', type);
            return;
          }
          const filtered = keyword ? allEntities.filter(e => e.name && e.name.toLowerCase && e.name.toLowerCase().includes(keyword.toLowerCase())) : allEntities;
          const nextEntities = filtered.slice(offset, offset + 10);
          const grid = document.querySelector(`#content-${type} .grid`);
          if (!grid) {
            console.error('找不到网格容器:', `#content-${type} .grid`);
            return;
          }
          nextEntities.forEach(e => {
            if (!e || !e.name) return;
            const html = `
              <button class="entity-item px-2 py-1.5 border border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 text-left transition-colors" data-entity-id="${e.id}" data-entity-name="${e.name}" data-entity-type="${e.entity_type}">
                <div class="font-medium text-sm">${e.name}</div>
              </button>
            `;
            grid.insertAdjacentHTML('beforeend', html);
          });
          const newOffset = offset + 10;
          if (newOffset >= filtered.length) {
            btn.remove();
          } else {
            btn.setAttribute('data-offset', String(newOffset));
          }
        });
      });

      // 绑定实体点击
      document.querySelectorAll('.entity-item').forEach(item => {
        item.addEventListener('click', () => {
          // 移除之前的选中状态
          document.querySelectorAll('.entity-item').forEach(i => i.classList.remove('bg-blue-500', 'text-white'));
          // 添加当前选中状态
          item.classList.add('bg-blue-500', 'text-white');
          const entityId = item.getAttribute('data-entity-id');
          loadEntityRelations(parseInt(entityId));
        });
      });
    }
  } catch (err) {
    console.error('加载搜索结果失败:', err);
    container.innerHTML = `<div class="text-red-500">加载失败: ${err.message}</div>`;
  }
}

// 广度优先搜索加载N层关系,保留4月17日优化:分层加载,点击已存在实体自动滚动到视图
async function loadEntityRelations(startEntityId) {
  // 保存当前起始实体ID,供渲染时使用
  window.currentStartEntityId = startEntityId;

  // 先检查实体是否已经在搜索结果列表中,如果在,滚动到视图
  const existingEntity = document.querySelector(`.entity-item[data-entity-id="${startEntityId}"]`);
  if (existingEntity) {
    // 移动到类型列表顶部
    const contentDiv = existingEntity.closest('.type-content');
    const typeDiv = contentDiv.parentElement;
    typeDiv.parentNode.insertBefore(typeDiv, typeDiv.parentNode.firstChild);
    // 滚动到该实体位置,居中显示
    existingEntity.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // 高亮闪烁提示
    existingEntity.classList.add('bg-blue-200');
    setTimeout(() => existingEntity.classList.remove('bg-blue-200'), 1500);
  }

  // BFS 广度优先搜索,自动加载三级关联
  const visited = new Set();
  const visitedNames = new Set();
  const levels = [];

  visited.add(parseInt(startEntityId));

  // 获取起始实体信息
  const startEntityElement = document.querySelector(`.entity-item[data-entity-id="${startEntityId}"]`);
  const startEntityName = startEntityElement?.getAttribute('data-entity-name') || '';
  const startEntityType = startEntityElement?.getAttribute('data-entity-type') || '';
  
  // 判断当前模式
  const isHistoryMode = window.currentSearchMode === 'history';

  if (startEntityName) {
    visitedNames.add(startEntityName.toLowerCase());
  }

  // 辅助函数：获取实体关系（根据模式选择API）
  async function getRelations(entityId, entityName, entityType) {
    try {
      if (isHistoryMode && entityName && entityType) {
        // 历史模式:始终用名称+类型查询
        const res = await fetch(`${API_BASE}/knowledge/relations-by-name?name=${encodeURIComponent(entityName)}&type=${encodeURIComponent(entityType)}`);
        return await res.json();
      } else {
        // 当前模式:用ID直接查询
        const res = await fetch(`${API_BASE}/knowledge/relations/${entityId}`);
        return await res.json();
      }
    } catch (e) {
      console.error('获取关系失败:', e);
      return { success: false, data: [] };
    }
  }

  // ============= 第一层:直接关联 =============
  try {
    const result = await getRelations(startEntityId, startEntityName, startEntityType);
    if (!result.success) {
      document.getElementById('relationLevel1').innerHTML = `<div class="text-red-500">加载失败: ${result.error}</div>`;
      return;
    }

    // 🔧 第一步:严格去重 - 排除指向自己、重复实体、空名称
    const seenFirstIds = new Set();
    const seenFirstNames = new Set();
    
    let firstRelations = result.data.filter(r => {
      const otherId = r.fromId === parseInt(startEntityId) ? r.toId : r.fromId;
      const otherName = r.fromId === parseInt(startEntityId) ? r.toName : r.fromName;
      
      // 过滤规则:
      // 1. 排除已访问的
      // 2. 排除指向自己的
      // 3. 排除空名称或与起始实体同名的
      // 4. 排除已经处理过的ID(去重)
      // 5. 排除已经处理过的名称(去重)
      if (visited.has(otherId)) return false;
      if (otherId === parseInt(startEntityId)) return false;
      if (!otherName || otherName === startEntityName) return false;
      if (seenFirstIds.has(otherId)) return false;
      if (seenFirstNames.has(otherName.toLowerCase())) return false;
      
      seenFirstIds.add(otherId);
      seenFirstNames.add(otherName.toLowerCase());
      return true;
    });
    
    // 标记已访问
    firstRelations.forEach(r => {
      const otherId = r.fromId === parseInt(startEntityId) ? r.toId : r.fromId;
      visited.add(otherId);
    });

    // 第一层渲染到右上方
    const container1 = document.getElementById('relationLevel1');
    if (firstRelations.length === 0) {
      container1.innerHTML = '<div class="text-gray-500">暂无直接关联关系</div>';
    } else {
      // 添加层级标题和说明
      container1.innerHTML = `
        <div class="mb-3 p-3 bg-gradient-to-r from-green-50 to-blue-50 rounded-lg border border-green-200">
          <div class="font-bold text-green-700 mb-1">📍 第 1 层 - 直接关联</div>
          <div class="text-xs text-gray-600">与 <strong>${startEntityName}</strong> 有直接关系的实体</div>
        </div>
        <div id="level1Content"></div>
      `;
      renderSingleLevel(document.getElementById('level1Content'), 1, firstRelations, visited, startEntityName, startEntityType);
      levels.push({ depth: 1, relations: firstRelations });
    }

    // ============= 第二层 + 第三层 =============
    let allSecondRelations = [];
    const seenInLayer = new Set(); // 同一层去重,不重复显示同一个实体
    const seenNames = new Set(); // 历史模式下按名称去重

    // 第二层:第一层每个实体的关联
    for (const r of firstRelations) {
      // ✅ Bug修复:获取第一层关系指向的实体信息
      const firstTargetId = r.fromId === parseInt(startEntityId) ? r.toId : r.fromId;
      const firstTargetName = r.fromId === parseInt(startEntityId) ? r.toName : r.fromName;
      const firstTargetType = r.fromId === parseInt(startEntityId) ? r.toType : r.fromType;
      
      // 历史模式下按名称去重
      if (firstTargetName) {
        const nameKey = firstTargetName.toLowerCase();
        if (seenNames.has(nameKey)) continue;
        seenNames.add(nameKey);
      }
      
      try {
        // 根据模式选择API
        const result = await getRelations(firstTargetId, firstTargetName, firstTargetType);
        if (result.success) {
          // ✅ 增强去重:更严格的过滤规则
          const newRelations = result.data.filter(x => {
            const nextId = x.fromId === parseInt(firstTargetId) ? x.toId : x.fromId;
            const nextName = x.fromId === parseInt(firstTargetId) ? x.toName : x.fromName;
            
            // 🔧 过滤规则
            if (!nextName) return false;                    // 排除空名称
            if (nextName === firstTargetName) return false;  // 排除指向自己
            if (nextId === firstTargetId) return false;      // 排除指向自己的ID
            if (nextId === parseInt(startEntityId)) return false; // 排除回到起点
            
            // 历史模式下按名称判断重复
            if (nextName && visitedNames.has(nextName.toLowerCase())) return false;
            if (nextName && seenNames.has(nextName.toLowerCase())) return false;
            
            // ID去重
            if (visited.has(nextId) || seenInLayer.has(nextId)) return false;
            return true;
          });
          
          newRelations.forEach(x => {
            const nextId = x.fromId === parseInt(firstTargetId) ? x.toId : x.fromId;
            const nextName = x.fromId === parseInt(firstTargetId) ? x.toName : x.fromName;
            visited.add(nextId);
            seenInLayer.add(nextId);
            if (nextName) visitedNames.add(nextName.toLowerCase());
          });
          
          allSecondRelations = allSecondRelations.concat(newRelations);
        }
      } catch (err) {
        console.error('加载第二层关系失败:', err);
      }
    }

    // 第三层:第二层每个实体的关联
    let allThirdRelations = [];
    for (const r of allSecondRelations) {
      // ✅ Bug修复:使用当前层（第二层）的实体ID作为基准，而不是startEntityId
      const level2TargetId = r.fromId;
      const level2TargetName = r.fromName;
      const level2TargetType = r.fromType;
      const otherId = r.toId;
      const otherName = r.toName;
      
      // 判断哪一端是真正指向的新实体（不是from端）
      let realTargetId, realTargetName, realTargetType;
      if (!visited.has(otherId)) {
        realTargetId = otherId;
        realTargetName = otherName;
        realTargetType = r.toType;
      } else {
        realTargetId = level2TargetId;
        realTargetName = level2TargetName;
        realTargetType = level2TargetType;
      }
      
      try {
        const result = await getRelations(realTargetId, realTargetName, realTargetType);
        if (result.success) {
          // ✅ 第三层同样增强去重
          const newRelations = result.data.filter(x => {
            const nextId = x.fromId === parseInt(realTargetId) ? x.toId : x.fromId;
            const nextName = x.fromId === parseInt(realTargetId) ? x.toName : x.fromName;
            
            // 🔧 过滤规则
            if (!nextName) return false;                           // 排除空名称
            if (nextName === realTargetName) return false;          // 排除指向自己
            if (nextId === realTargetId) return false;              // 排除指向自己的ID
            if (nextId === parseInt(startEntityId)) return false;   // 排除回到第一层起点
            if (nextName === startEntityName) return false;         // 排除回到第一层起点名称
            
            // 名称去重
            if (nextName && visitedNames.has(nextName.toLowerCase())) return false;
            // ID去重
            if (visited.has(nextId) || seenInLayer.has(nextId)) return false;
            return true;
          });
          
          newRelations.forEach(x => {
            const nextId = x.fromId === parseInt(realTargetId) ? x.toId : x.fromId;
            const nextName = x.fromId === parseInt(realTargetId) ? x.toName : x.fromName;
            visited.add(nextId);
            seenInLayer.add(nextId);
            if (nextName) visitedNames.add(nextName.toLowerCase());
          });
          
          allThirdRelations = allThirdRelations.concat(newRelations);
        }
      } catch (err) {
        console.error('加载第三层关系失败:', err);
      }
    }

    // 第二层和第三层渲染到右下方
    const containerDeep = document.getElementById('relationLevelsDeep');
    if (allSecondRelations.length === 0 && allThirdRelations.length === 0) {
      containerDeep.innerHTML = '<div class="text-gray-500">暂无更深层关联关系</div>';
    } else {
      // 分组渲染:第二层单独一块,第三层单独一块
      let html = '';
      
      // 渲染第二层 - 添加路径描述
      if (allSecondRelations.length > 0) {
        html += `<div class="mb-6">
          <div class="mb-3 p-3 bg-gradient-to-r from-orange-50 to-yellow-50 rounded-lg border border-orange-200">
            <div class="font-bold text-orange-700 mb-1">📍 第 2 层 - 间接关联</div>
            <div class="text-xs text-gray-600">
              通过第1层实体与 <strong>${startEntityName}</strong> 形成关联路径
            </div>
          </div>
          <div class="grid grid-cols-1 gap-3">`;
        
        allSecondRelations.forEach(r => {
          const level2BaseId = r.fromId;
          const level2BaseName = r.fromName;
          const level2BaseType = r.fromType;
          const otherId = r.toId;
          const otherName = r.toName;
          const otherType = r.toType;
          const relationLabel = r.label || r.relation;
          
          const baseTypeInfo = entityTypeNames[level2BaseType] || { name: '未知', color: '#999' };
          const targetTypeInfo = entityTypeNames[otherType] || { name: '未知', color: '#999' };
          
          // 生成完整路径描述
          const midTemplate = relationPathTemplates['关联'] || relationPathTemplates.default;
          const endTemplate = relationPathTemplates[relationLabel] || relationPathTemplates.default;
          const midDesc = midTemplate.length === 2 ? midTemplate(startEntityName, level2BaseName) : midTemplate(startEntityName, '关联', level2BaseName);
          const endDesc = endTemplate.length === 2 ? endTemplate(level2BaseName, otherName) : endTemplate(level2BaseName, relationLabel, otherName);

          html += `
            <button class="relation-item p-4 border border-gray-200 rounded-xl text-left hover:bg-orange-50 hover:border-orange-400 transition-all" data-entity-id="${otherId}" data-entity-name="${otherName || ''}" data-entity-type="${otherType || ''}">
              <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                  <span class="w-3 h-3 rounded-full" style="background-color: ${targetTypeInfo.color}"></span>
                  <span class="font-bold text-lg text-gray-800">${otherName}</span>
                </div>
                <span class="text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded-full">${targetTypeInfo.name}</span>
              </div>
              
              <!-- 完整关系路径展示 -->
              <div class="bg-gradient-to-r from-gray-50 to-orange-50 p-3 rounded-lg border border-orange-100">
                <div class="text-xs font-semibold text-orange-600 mb-2">🔗 完整关系路径</div>
                <div class="text-sm leading-relaxed">
                  <div class="mb-1">
                    <span class="inline-block w-4 h-4 bg-green-400 rounded-full text-white text-xs text-center leading-4 mr-1">1</span>
                    ${midDesc}
                  </div>
                  <div class="text-center text-gray-400 text-xs my-1">↓</div>
                  <div>
                    <span class="inline-block w-4 h-4 bg-blue-400 rounded-full text-white text-xs text-center leading-4 mr-1">2</span>
                    ${endDesc}
                  </div>
                </div>

// 渲染单层关系(用于第一层)
function renderSingleLevel(container, depth, relations, visited, startEntityName, startEntityType) {
  if (relations.length === 0) {
    container.innerHTML = '<div class="text-gray-500">暂无关联关系</div>';
    return;
  }

  // 按关系类型分组展示
  const groupedRelations = {};
  relations.forEach(r => {
    const relType = r.label || r.relation;
    if (!groupedRelations[relType]) groupedRelations[relType] = [];
    groupedRelations[relType].push(r);
  });

  let html = '';

  // 为每种关系类型添加说明和实体卡片
  for (const [relType, relList] of Object.entries(groupedRelations)) {
    const relDesc = relationTypeDescriptions[relType] || null;
    const startInfo = entityTypeNames[startEntityType] || { name: '未知' };

    html += `
      <div class="mb-4 border-l-4 border-blue-400 pl-3">
        <div class="flex items-center justify-between mb-2">
          <div class="font-semibold text-blue-700">「${relType}」关系</div>
          <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full">${relList.length} 个实体</span>

        ${relDesc ? `<div class="text-xs text-gray-600 mb-2 bg-blue-50 p-2 rounded">${relDesc.description}</div>` : ''}
        <div class="grid grid-cols-2 gap-2">
    `;

    relList.forEach(r => {
      // 🔧 关键修复:根据关系方向,正确取另一端的实体信息
      // 如果起点是from端,则取to端为目标;如果起点是to端,则取from端为目标
      const isStartFromFrom = r.fromId === parseInt(currentStartEntityId);
      const targetId = isStartFromFrom ? r.toId : r.fromId;
      const targetName = isStartFromFrom ? r.toName : r.fromName;
      const targetType = isStartFromFrom ? r.toType : r.fromType;
      const relationLabel = r.label || r.relation;
      const typeInfo = entityTypeNames[targetType] || { name: '未知', color: '#999' };
      const disabled = visited.has(parseInt(targetId)) ? 'opacity-50 bg-gray-100' : '';

      // 生成自然语言关系描述
      const template = relationPathTemplates[relationLabel] || relationPathTemplates.default;
      const relationDesc = relationLabel !== 'default' && template.length === 2 
        ? template(startEntityName, targetName)
        : template(startEntityName, relationLabel, targetName);

      html += `
        <button class="relation-item px-3 py-3 border border-gray-200 rounded-xl text-left hover:bg-blue-50 hover:border-blue-400 transition-all ${disabled}" data-entity-id="${targetId}" data-entity-name="${targetName}" data-entity-type="${targetType}">

            <span class="w-3 h-3 rounded-full" style="background-color: ${typeInfo.color}"></span>
            <span class="font-bold text-gray-800">${targetName}</span>
          </div>
          <div class="text-xs text-gray-500 mb-1">${typeInfo.name}</div>
          <div class="text-xs text-blue-600 bg-blue-50 p-1.5 rounded">
            ↪️ ${relationDesc}
          </div>
        </button>
      `;
    });

    html += '</div></div>';
  }

  container.innerHTML = html;

  // 绑定点击事件
  container.querySelectorAll('.relation-item').forEach(btn => {
    btn.addEventListener('click', async () => {
      const entityId = parseInt(btn.getAttribute('data-entity-id'));

      // 先检查实体是否已经在左侧搜索结果中,如果在,滚动到那里并选中
      const existingEntity = document.querySelector(`.entity-item[data-entity-id="${entityId}"]`);
      if (existingEntity) {
        // 移除其他选中状态
        document.querySelectorAll('.entity-item').forEach(i => i.classList.remove('bg-blue-500', 'text-white'));
        // 移动到类型列表顶部
        const contentDiv = existingEntity.closest('.type-content');
        const typeDiv = contentDiv.parentElement;
        typeDiv.parentNode.insertBefore(typeDiv, typeDiv.parentNode.firstChild);
        // 滚动到视图居中并选中
        existingEntity.scrollIntoView({ behavior: 'smooth', block: 'center' });
        existingEntity.classList.add('bg-blue-500', 'text-white');
        // 以这个实体为中心重新加载关系
        loadEntityRelations(entityId);
        return;
      }

      // 如果不在列表中,仍然可以直接以它为中心加载
      if (!visited.has(entityId)) {
        loadEntityRelations(entityId);
      }
    });
  });
}

// 加载统计信息
// 从历史实体表获取统计数据,包含所有历史解析出来的实体
async function loadKnowledgeStats() {
  try {
    const res = await fetch(`${API_BASE}/knowledge/history/stats`);
    const result = await res.json();
    if (!result.success) {
      document.getElementById('statsContent').innerHTML = `<div class="text-red-500">加载失败: ${result.error}</div>`;
      return;
    }

    const data = result.data;
    // 转换数组格式为对象:{ entity_type: count }
    const stats = {};
    if (data.byType && Array.isArray(data.byType)) {
      data.byType.forEach(item => {
        stats[item.entity_type] = item.count;
      });
    }
    let sumTypeEntities = 0;

    let html = '<div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">';

    Object.entries(stats).forEach(([type, count]) => {
      sumTypeEntities += count;
      const typeInfo = entityTypeNames[type];
      const name = typeInfo ? typeInfo.name : type;
      const color = typeInfo ? typeInfo.color : '#999';
      html += `
        <div class="p-4 border border-gray-200 rounded-lg">
          <div class="text-sm text-gray-500 mb-1">${name}</div>
          <div class="text-3xl font-bold" style="color: ${color}">${count}</div>
        </div>
      `;
    });

    html += '</div>';

    // 汇总统计卡片
    const totalEntities = data.total || sumTypeEntities;
    // 准备饼图数据
    const pieData = [];
    Object.entries(stats).forEach(([type, count]) => {
      const typeInfo = entityTypeNames[type];
      pieData.push({
        name: typeInfo ? typeInfo.name : type,
        value: count,
        color: typeInfo ? typeInfo.color : '#999'
      });
    });

    // 汇总统计卡片
    html += `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div class="p-4 bg-blue-50 border border-blue-200 rounded-lg">
        <div class="text-sm text-blue-600 mb-1">去重后唯一实体</div>
        <div class="text-3xl font-bold text-blue-800">${totalEntities}</div>
      </div>
      <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
        <div class="text-sm text-green-600 mb-1">累计出现次数</div>
        <div class="text-3xl font-bold text-green-800">${Object.values(stats).reduce((a,b) => a + b, 0)}</div>
      </div>
      <div class="p-4 bg-purple-50 border border-purple-200 rounded-lg">
        <div class="text-sm text-purple-600 mb-1">实体类型数</div>
        <div class="text-3xl font-bold text-purple-800">${Object.keys(stats).length}</div>
      </div>
    </div>

    <div class="mt-6 bg-white border border-gray-200 rounded-lg p-4">
      <h3 class="text-lg font-semibold mb-4 text-gray-800">📊 实体类型分布</h3>
      <div id="entityTypePieChart" style="width: 100%; height: 350px;"></div>
    </div>

    <div class="mt-4 p-3 bg-gray-50 border border-gray-200 rounded-lg">
      <div class="text-gray-600">统计数据来自历史存档表,包含所有上传文件解析出来的实体,自动去重保留唯一实体</div>
    </div>
    `;

    document.getElementById('statsContent').innerHTML = html;

    // 如果有ECharts,渲染饼图
    if (typeof echarts !== 'undefined' && document.getElementById('entityTypePieChart')) {
      setTimeout(() => {
        const chartDom = document.getElementById('entityTypePieChart');
        let myChart = echarts.getInstanceByDom(chartDom);
        if (!myChart) {
          myChart = echarts.init(chartDom);
        }

        // 饼图数据已经在上方定义好了直接使用

        const option = {
          tooltip: {
            trigger: 'item',
            formatter: '{b}: {c} ({d}%)'
          },
          legend: {
            orient: 'vertical',
            left: 'left'
          },
          series: [
            {
              name: '实体类型',
              type: 'pie',
              radius: '50%',
              center: ['55%', '50%'],
              data: pieData.map(item => ({
                name: item.name,
                value: item.value,
                itemStyle: { color: item.color }
              })),
              emphasis: {
                itemStyle: {
                  shadowBlur: 10,
                  shadowOffsetX: 0,
                  shadowColor: 'rgba(0, 0, 0, 0.5)'
                }
              }
            }
          ]
        };

        myChart.setOption(option);

        // 自适应resize
        window.addEventListener('resize', () => myChart.resize());
      }, 100);
    }
  } catch (err) {
    console.error('加载统计失败:', err);
    document.getElementById('statsContent').innerHTML = `<div class="text-red-500">加载失败: ${err.message}</div>`;
  }
}

// Tab切换
function switchLegalTab(tab) {
  // 更新按钮样式
  const presetBtn = document.getElementById('tab-preset');
  const customBtn = document.getElementById('tab-custom');
  const presetPanel = document.getElementById('panel-preset');
  const customPanel = document.getElementById('panel-custom');

  if (tab === 'preset') {
    presetBtn.classList.remove('text-gray-500', 'border-transparent', 'hover:text-gray-700', 'hover:border-gray-300');
    presetBtn.classList.add('text-blue-600', 'border-b-2', 'border-blue-600', 'font-medium');
    customBtn.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600', 'font-medium');
    customBtn.classList.add('text-gray-500', 'border-transparent', 'hover:text-gray-700', 'hover:border-gray-300');
    presetPanel.style.display = 'block';
    customPanel.style.display = 'none';
  } else {
    customBtn.classList.remove('text-gray-500', 'border-transparent', 'hover:text-gray-700', 'hover:border-gray-300');
    customBtn.classList.add('text-blue-600', 'border-b-2', 'border-blue-600', 'font-medium');
    presetBtn.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600', 'font-medium');
    presetBtn.classList.add('text-gray-500', 'border-transparent', 'hover:text-gray-700', 'hover:border-gray-300');
    customPanel.style.display = 'block';
    presetPanel.style.display = 'none';
  }
}

// 根据违规情况生成经验教训
function generateLessons(violations) {
  if (violations.length === 0) {
    return '<p class="text-gray-600">未检测到明确违法违规条款,本案属于合法合规操作,无需额外改进建议。</p>';
  }

  let lessons = '<ul class="space-y-3 list-disc pl-5 text-gray-700">';

  const lessonMap = {
    '超速': '<li><strong>超速行驶</strong>严重危及行车安全,建议:<ul class="space-y-1 pl-5"><li>严格遵守限速要求,根据道路状况和交通标志调整车速</li><li>长途驾驶建议每2小时休息一次,避免疲劳驾驶导致注意力不集中超速</li><li>通过测速区间提前控制车速</li></ul></li>',
    '酒驾': '<li><strong>酒后驾驶</strong>是严重交通违法行为,建议:<ul class="space-y-1 pl-5"><li>饮酒不开车,开车不饮酒</li><li>提前规划代驾或打车,避免侥幸心理</li></ul></li>',
    '疲劳': '<li><strong>疲劳驾驶</strong>会导致反应迟钝、判断失误,建议:<ul class="space-y-1 pl-5"><li>连续驾驶不超过4小时,停车休息不少于20分钟</li><li>感觉困倦时及时驶入服务区休息</li></ul></li>',
    '闯红灯': '<li><strong>违反交通信号灯指示</strong>极易引发交叉口交通事故,建议:<ul class="space-y-1 pl-5"><li>路口提前减速,注意观察信号灯</li><li>黄灯提前减速,不要加速抢行</li></ul></li>',
    '逆行': '<li><strong>逆向行驶</strong>是严重危险行为,建议:<ul class="space-y-1 pl-5"><li>严格按照车道指示方向行驶</li><li>走错路线及时纠正,不要原地倒车逆行</li></ul></li>',
    '超载': '<li><strong>超载/超限</strong>会影响车辆制动和操控性能,建议:<ul class="space-y-1 pl-5"><li>严格按照核定载重/载客人数运行</li><li>定期检查车辆制动系统</li></ul></li>'
  };

  // 收集所有不重复的教训
  const added = new Set();
  violations.forEach(v => {
    let content = '';
    if (v.content.includes('超速')) content = lessonMap['超速'];
    else if (v.content.includes('饮酒') || v.content.includes('酒驾')) content = lessonMap['酒驾'];
    else if (v.content.includes('疲劳')) content = lessonMap['疲劳'];
    else if (v.content.includes('红灯') || v.content.includes('闯红灯')) content = lessonMap['闯红灯'];
    else if (v.content.includes('逆行')) content = lessonMap['逆行'];
    else if (v.content.includes('超载') || v.content.includes('超限')) content = lessonMap['超载'];

    if (content && !added.has(content)) {
      lessons += content;
      added.add(content);
    }
  });

  // 添加通用安全建议
  lessons += `
      <li><strong>通用安全出行建议:</strong><ul class="space-y-1 pl-5">
        <li>出行前检查车辆证件、保险是否齐全有效</li>
        <li>行车全程全员系好安全带</li>
        <li>恶劣天气降低车速,增大跟车距离</li>
        <li>发生事故后立即开启危险报警闪光灯,将车辆移至安全地点,报警等待处理</li>
      </ul></li>
  `;

  lessons += '</ul>';
  return lessons;
}

/**
 * 使用Catmull-Rom样条曲线平滑轨迹 - 自然过渡不穿墙
 */
function smoothTrajectoryCatmullRom(points) {
  if (points.length < 2) {
    return [];
  }
  
  // 首先将所有坐标转换为浮点数并验证有效性
  const validPoints = points.map(p => ({
    longitude: parseFloat(p.longitude),
    latitude: parseFloat(p.latitude),
    ...p
  })).filter(p => 
    isFinite(p.longitude) && isFinite(p.latitude) &&
    p.longitude > 73 && p.longitude < 136 && // 中国经度范围
    p.latitude > 3 && p.latitude < 54        // 中国纬度范围
  );
  
  if (validPoints.length < 2) {
    return [];
  }
  
  // 过滤掉重复的点（车辆停留）
  const uniquePoints = [];
  let lastPoint = null;
  for (const p of validPoints) {
    if (!lastPoint || 
        Math.abs(p.longitude - lastPoint.longitude) > 0.0001 || 
        Math.abs(p.latitude - lastPoint.latitude) > 0.0001) {
      uniquePoints.push(p);
      lastPoint = p;
    }
  }
  
  console.log('过滤重复点前:', points.length, ' 过滤后:', uniquePoints.length);
  
  // 如果过滤后只剩1个点，返回原始2个点
  if (uniquePoints.length < 2) {
    return [
      [points[0].longitude, points[0].latitude],
      [points[points.length - 1].longitude, points[points.length - 1].latitude]
    ];
  }
  
  // 转换为坐标数组
  const coords = uniquePoints.map(p => ({ x: p.longitude, y: p.latitude }));
  const result = [];
  
  // Catmull-Rom 样条曲线插值
  for (let i = 0; i < coords.length - 1; i++) {
    const p0 = coords[Math.max(0, i - 1)];
    const p1 = coords[i];
    const p2 = coords[i + 1];
    const p3 = coords[Math.min(coords.length - 1, i + 2)];
    
    // 每段生成20个插值点，确保平滑
    for (let t = 0; t <= 1; t += 0.05) {
      const t2 = t * t;
      const t3 = t2 * t;
      
      // Catmull-Rom 公式
      const x = 0.5 * (
        2 * p1.x +
        (-p0.x + p2.x) * t +
        (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
        (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3
      );
      const y = 0.5 * (
        2 * p1.y +
        (-p0.y + p2.y) * t +
        (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
        (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3
      );
      
      // 检查是否为有效数值
      if (isFinite(x) && isFinite(y)) {
        result.push([x, y]);
      }
    }
  }
  
  // 如果平滑失败，返回原始点直线
  if (result.length === 0) {
    return uniquePoints.map(p => [p.longitude, p.latitude]);
  }
  
  return result;
}

/**
 * 绘制平滑轨迹线
 */
async function drawRoadNetworkTrajectory(points) {
  try {
    console.log('绘制轨迹，点数:', points.length);
    
    // 严格验证每个点的经纬度，确保没有 NaN
    const validPoints = points.filter(p => {
      const lng = parseFloat(p.longitude);
      const lat = parseFloat(p.latitude);
      return !isNaN(lng) && !isNaN(lat) && 
             lng > 73 && lng < 136 && // 中国经度范围
             lat > 3 && lat < 54;    // 中国纬度范围
    });
    
    console.log('有效点数:', validPoints.length);
    
    if (validPoints.length < 2) {
      console.warn('有效轨迹点不足2个，无法绘制');
      return;
    }
    
    // 直接连接每一个连续的坐标点，不做平滑处理
    const path = validPoints.map(p => [parseFloat(p.longitude), parseFloat(p.latitude)]);
    
    // 绘制轨迹线（亮青色，细线条，发光效果）
    const polyline = new AMap.Polyline({
      path: path,
      strokeColor: '#00E5FF',  // 亮青色 - 醒目吸睛
      strokeWeight: 3,         // 细线条
      strokeOpacity: 1,        // 完全不透明
      lineJoin: 'round',
      lineCap: 'round',
      showDir: true,           // 显示方向箭头
      strokeStyle: 'solid'
    });
    
    truckMap.add(polyline);
    trajectoryLines.push(polyline);
    
    // 添加第二层发光效果（稍粗一点的半透明线条在下层）
    const glowPolyline = new AMap.Polyline({
      path: path,
      strokeColor: '#00E5FF',
      strokeWeight: 8,
      strokeOpacity: 0.2,      // 半透明发光效果
      lineJoin: 'round',
      lineCap: 'round',
      strokeStyle: 'solid'
    });
    
    truckMap.add(glowPolyline);
    trajectoryLines.push(glowPolyline);
    
    // ========== 🎯 添加起点和终点标记 ==========
    if (path.length >= 2) {
      const startPoint = path[0];
      const endPoint = path[path.length - 1];
      
      // 🟢 起点标记 - 绿色大箭头（S=Start）
      const startMarker = new AMap.Marker({
        position: startPoint,
        offset: new AMap.Pixel(-15, -35),
        content: `
          <div style="
            position: relative;
            width: 30px;
            height: 40px;
          ">
            <!-- 绿色箭头主体 -->
            <div style="
              width: 0;
              height: 0;
              border-left: 15px solid transparent;
              border-right: 15px solid transparent;
              border-bottom: 20px solid #10B981;
              filter: drop-shadow(0 2px 4px rgba(16, 185, 129, 0.5));
            "></div>
            <!-- 绿色箭杆 -->
            <div style="
              position: absolute;

    }

  } catch (err) {
    console.error('轨迹绘制失败:', err);
    // 回退到简单直线
    try {
      const validPoints = points.filter(p => {
        const lng = parseFloat(p.longitude);
        const lat = parseFloat(p.latitude);
        return !isNaN(lng) && !isNaN(lat);
      });
      if (validPoints.length >= 2) {
        const path = validPoints.map(p => [parseFloat(p.longitude), parseFloat(p.latitude)]);
        const polyline = new AMap.Polyline({
          path: path,
          strokeColor: '#00E5FF',
          strokeWeight: 3,
          strokeOpacity: 1
        });
        truckMap.add(polyline);
        trajectoryLines.push(polyline);
      }
    } catch (e) {
      console.error('回退绘制也失败:', e);
    }
  }
}

// 清除所有点标记（不清除轨迹线）
function clearPointMarkers() {
  pointMarkers.forEach(marker => {
    try { truckMap.remove(marker); } catch(e) {}
  });
  pointMarkers = [];
}

// 绘制单个坐标点标记
function drawPointMarker(point, index, isStart = false, isEnd = false, isSelected = false) {
  let color = '#3B82F6'; // 默认蓝色
  let size = 10;
  
  if (isStart) {
    color = '#10B981'; // 起点绿色
    size = 16;
  } else if (isEnd) {
    color = '#EF4444'; // 终点红色
    size = 16;
  } else if (isSelected) {
    color = '#F59E0B'; // 选中橙色
    size = 20;
  }
  
  const marker = new AMap.Marker({
    position: [parseFloat(point.longitude), parseFloat(point.latitude)],
    icon: new AMap.Icon({
      size: new AMap.Size(size, size),
      imageSize: new AMap.Size(size, size),
      image: 'data:image/svg+xml;base64,' + btoa(`
        <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">
          <circle cx="${size/2}" cy="${size/2}" r="${size/2 - 1}" fill="${color}" stroke="white" stroke-width="2"/>
        </svg>
      `)
    }),
    title: `点 ${index + 1}: ${point.position_time}`
  });
  
  marker.on('click', () => {
    highlightPoint(index);
  });
  
  truckMap.add(marker);
  pointMarkers.push(marker);
  return marker;
}

// 高亮选中的坐标点
function highlightPoint(index) {
  if (!selectedSegment) return;
  
  selectedPointIndex = index;
  const point = selectedSegment.points[index];
  
  // 清除所有点标记并重绘
  clearPointMarkers();
  
  // 重新绘制所有点，高亮选中点
  selectedSegment.points.forEach((p, i) => {
    const isStart = i === 0;
    const isEnd = i === selectedSegment.points.length - 1;
    const isSelected = i === index;
    drawPointMarker(p, i, isStart, isEnd, isSelected);
  });
  
  // 地图居中到选中点
  truckMap.setCenter([parseFloat(point.longitude), parseFloat(point.latitude)]);
  truckMap.setZoom(14);
  
  // 滚动列表到选中项
  const pointItem = document.getElementById(`point-${index}`);
  if (pointItem) {
    pointItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// 显示分段轨迹
async function showSegment(segmentId) {
  const segment = currentTrajectoryData.segments.find(s => s.segmentId === segmentId);
  if (!segment) return;
  
  selectedSegment = segment;
  selectedPointIndex = null;
  
  // 清除现有轨迹和点标记
  clearTruckMap();
  
  // 过滤无效的坐标点（经纬度为NaN或0）
  const validPoints = segment.points.filter(p => 
    p.longitude && p.latitude && 
    !isNaN(p.longitude) && !isNaN(p.latitude) &&
    Math.abs(p.longitude) > 0.001 && Math.abs(p.latitude) > 0.001
  );
  
  if (validPoints.length === 0) {
    console.warn('该段轨迹没有有效的坐标点');
    return;
  }
  
  // 绘制该段轨迹
  await drawRoadNetworkTrajectory(validPoints);
  
  // 绘制所有有效坐标点
  validPoints.forEach((point, index) => {
    const isStart = index === 0;
    const isEnd = index === validPoints.length - 1;
    drawPointMarker(point, index, isStart, isEnd, false);
  });
  
  // 自动调整地图视图 - 使用正确的高德地图 Bounds 格式
  if (validPoints.length >= 2) {
    // 计算经纬度范围
    const lngs = validPoints.map(p => parseFloat(p.longitude));
    const lats = validPoints.map(p => parseFloat(p.latitude));
    const minLng = Math.min(...lngs);
    const maxLng = Math.max(...lngs);
    const minLat = Math.min(...lats);
    const maxLat = Math.max(...lats);
    
    // AMap.Bounds(southWest: LngLat, northEast: LngLat)
    const southWest = new AMap.LngLat(minLng, minLat);
    const northEast = new AMap.LngLat(maxLng, maxLat);
    const bounds = new AMap.Bounds(southWest, northEast);
    truckMap.setBounds(bounds, true, [60, 60, 60, 60]);
  }
  
  // 更新点列表（使用过滤后的有效点）
  renderPointList({ ...segment, points: validPoints });
  
  // 高亮选中的分段
  document.querySelectorAll('.segment-item').forEach(item => {
    item.classList.remove('bg-blue-100', 'border-blue-400');
    item.classList.add('bg-gray-50', 'border-gray-200');
  });
  const selectedItem = document.getElementById(`segment-${segmentId}`);
  if (selectedItem) {
    selectedItem.classList.remove('bg-gray-50', 'border-gray-200');
    selectedItem.classList.add('bg-blue-100', 'border-blue-400');
  }
}

// 节假日拥堵系数
const holidayCongestionFactors = {
  '元旦': 1.3,
  '春节': 1.8,
  '清明节': 1.5,
  '劳动节': 2.0,
  '端午节': 1.4,
  '国庆节': 2.2
};

// 计算路段拥堵指数
function calculateCongestionIndex(segment, year, holiday) {
  const yearDiff = year - 2023;
  const holidayFactor = holidayCongestionFactors[holiday] || 1.0;
  // 远期预测增长放缓（因为交通容量有上限）
  const growthFactor = yearDiff > 3 ? 3 + (yearDiff - 3) * 0.5 : yearDiff;
  let congestion = segment.baseCongestion * (1 + segment.trend * growthFactor) * holidayFactor;
  congestion = congestion * (0.92 + Math.random() * 0.16);
  return Math.min(5, Math.max(1, congestion));
}

// 根据拥堵指数获取颜色（优化配色）
function getCongestionColor(index) {
  if (index < 2.0) {
    // 畅通：清新绿色系
    return index < 1.5 ? '#4ADE80' : '#86EFAC';
  } else if (index < 2.8) {
    // 基本畅通：黄绿色系
    return index < 2.4 ? '#A3E635' : '#BEF264';
  } else if (index < 3.5) {
    // 缓行：黄色系
    return index < 3.2 ? '#FACC15' : '#FDE047';
  } else if (index < 4.2) {
    // 拥堵：橙色系
    return index < 3.8 ? '#FB923C' : '#FDBA74';
  } else {
    // 严重拥堵：红色系
    return index < 4.6 ? '#EF4444' : '#DC2626';
  }
}

// 获取拥堵等级文字
function getCongestionLevel(index) {
  if (index < 2.0) return { text: '畅通', class: 'text-green-600 bg-green-100' };
  if (index < 3.0) return { text: '基本畅通', class: 'text-lime-600 bg-lime-100' };
  if (index < 3.5) return { text: '缓行', class: 'text-yellow-600 bg-yellow-100' };
  if (index < 4.2) return { text: '拥堵', class: 'text-orange-600 bg-orange-100' };
  return { text: '严重拥堵', class: 'text-red-600 bg-red-100' };
}

// 初始化地图
function initCongestionMap() {
  const container = document.getElementById('congestionMapContainer');
  if (!container) { setTimeout(initCongestionMap, 200); return; }
  container.style.height = '500px';
  container.style.width = '100%';
  
  if (congestionMap) { try { congestionMap.destroy(); } catch(e) {} congestionMap = null; }

  if (typeof AMap === 'undefined') {
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;flex-direction:column;"><div>🔄 地图加载中...</div></div>';
    setTimeout(initCongestionMap, 1000);
    return;
  }

  try {
    congestionMap = new AMap.Map(container, {
      center: [118.2, 36.4],
      zoom: 7,
      viewMode: '2D',
      zooms: [6, 12],
      resizeEnable: true,
      layers: [new AMap.TileLayer()]
    });
    
    // 强制刷新 - 解决底图不显示问题
    setTimeout(() => {
      if (congestionMap) {
        congestionMap.resize();
        congestionMap.setZoom(congestionMap.getZoom());
      }
    }, 300);
    
    updateCongestionPrediction();
  } catch (err) {
    console.error('拥堵地图加载失败:', err);
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;flex-direction:column;"><div>❌ 地图加载失败</div><div style="font-size:12px;margin:5px;">' + err.message + '</div><button onclick="initCongestionMap()" style="margin-top:10px;padding:5px 15px;background:#3B82F6;color:#fff;border:none;border-radius:4px;cursor:pointer;">重试</button></div>';
  }
}

// 更新拥堵预测数据
function updateCongestionPrediction() {
  const year = parseInt(document.getElementById('congestionYearSelect').value);
  const holiday = document.getElementById('congestionHolidaySelect').value;
  
  // 根据年份动态切换文字：2026年以前叫展示，2026年及以后叫预测
  const currentYear = new Date().getFullYear();
  const isPrediction = year >= currentYear;
  const titleEl = document.getElementById('congestionTitle');
  const labelEl = document.getElementById('congestionYearLabel');
  const btnEl = document.getElementById('refreshCongestionBtn');
  
  if (isPrediction) {
    titleEl.textContent = '🚦 路段拥堵预测';
    labelEl.textContent = '预测年份:';
    btnEl.textContent = '🔄 刷新预测';
  } else {
    titleEl.textContent = '📊 路段拥堵历史展示';
    labelEl.textContent = '历史年份:';
    btnEl.textContent = '🔄 刷新数据';
  }
  
  const segmentsWithCongestion = highwaySegments.map(segment => {
    const congestionIndex = calculateCongestionIndex(segment, year, holiday);
    const level = getCongestionLevel(congestionIndex);
    const avgSpeed = Math.floor(120 - congestionIndex * 15);
    const travelTime = Math.floor(segment.points.length * 5 * congestionIndex * 0.5);
    return { ...segment, congestionIndex: congestionIndex.toFixed(2), congestionLevel: level, avgSpeed: avgSpeed, travelTime: travelTime };
  });
  
  segmentsWithCongestion.sort((a, b) => b.congestionIndex - a.congestionIndex);
  renderCongestionSegments(segmentsWithCongestion);
  renderCongestionTable(segmentsWithCongestion);
}

// 渲染地图路段
function renderCongestionSegments(segments) {
  congestionPolylines.forEach(line => { try { congestionMap.remove(line); } catch(e) {} });
  congestionPolylines = [];
  
  segments.forEach((segment, idx) => {
    const color = getCongestionColor(parseFloat(segment.congestionIndex));
    // 优化线条粗细：更细更精致
    const lineWeight = 2 + parseFloat(segment.congestionIndex) * 0.8;
    const polyline = new AMap.Polyline({ 
      path: segment.points, 
      strokeColor: color, 
      strokeWeight: lineWeight, 
      strokeOpacity: 0.9,
      strokeStyle: 'solid',
      lineJoin: 'round',
      lineCap: 'round',
      cursor: 'pointer' 
    });
    polyline.segmentData = segment;
    congestionMap.add(polyline);
    congestionPolylines.push(polyline);
  });
}

// 渲染表格
function renderCongestionTable(segments) {
  const tbody = document.getElementById('congestionTableBody');
  tbody.innerHTML = segments.map((segment, idx) => {
    const level = segment.congestionLevel;
    const rowClass = idx < 3 ? 'bg-red-50' : idx < 6 ? 'bg-orange-50' : '';
    const color = getCongestionColor(parseFloat(segment.congestionIndex));
    return '<tr class="border-b border-gray-100 hover:bg-blue-50 ' + rowClass + '">' +
      '<td class="px-4 py-3 font-bold">#' + (idx + 1) + '</td>' +
      '<td class="px-4 py-3">' + segment.name + '</td>' +
      '<td class="px-4 py-3 text-center"><div class="inline-flex items-center gap-2"><div class="w-4 h-4 rounded-full" style="background:' + color + '"></div><span class="font-bold">' + segment.congestionIndex + '</span></div></td>' +
      '<td class="px-4 py-3 text-center"><span class="px-2 py-1 rounded-full text-xs font-semibold ' + level.class + '">' + level.text + '</span></td>' +
      '<td class="px-4 py-3 text-right font-mono">' + segment.avgSpeed + ' km/h</td>' +
      '<td class="px-4 py-3 text-right font-mono">约 ' + segment.travelTime + ' 分钟</td>' +
    '</tr>';
  }).join('');
}
