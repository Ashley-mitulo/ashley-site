<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>注册 · Ashley Lab</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/theme.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <div class="brand"><div class="brand-mark">A</div>
      <div><div class="brand-name">Ashley Lab</div><div class="brand-sub">南京 · 智能系统实验室</div></div></div>
    <div class="nav-menu">
      <a href="/">首页</a><a href="/about.html">关于我</a>
      <a href="/projects.html">项目展示</a><a href="/feedback.html">Bug 反馈</a>
    </div>
    <div class="nav-user" id="navUser"></div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h2 class="auth-title">注册账号</h2>
    <p class="auth-sub">注册后即可体验完整项目 · 找 bug 也需要账号</p>
    <div id="msg" class="msg"></div>
    <form id="regForm">
      <div class="form-group">
        <label>用户名 <span style="color:#94a3b8;font-size:12px;">（3-30 位）</span></label>
        <input type="text" id="username" required minlength="3" maxlength="30">
      </div>
      <div class="form-group">
        <label>昵称（选填）</label>
        <input type="text" id="display_name" maxlength="30" placeholder="朋友们怎么叫你">
      </div>
      <div class="form-group">
        <label>密码 <span style="color:#94a3b8;font-size:12px;">（至少 6 位）</span></label>
        <input type="password" id="password" required minlength="6">
      </div>
      <button type="submit" class="btn-submit" id="btn">注册</button>
    </form>
    <div class="auth-links">已有账号？<a href="/login.html">去登录</a></div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
renderNavUser();
document.getElementById('regForm').addEventListener('submit', async e => {
  e.preventDefault();
  hideMsg('msg');
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '注册中...';
  const res = await api.post('/api/register', {
    username: document.getElementById('username').value.trim(),
    display_name: document.getElementById('display_name').value.trim(),
    password: document.getElementById('password').value,
  });
  btn.disabled = false; btn.textContent = '注册';
  if (res.ok) {
    showMsg('msg', '注册成功，正在自动登录...', 'success');
    const login = await api.post('/api/login', {
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value,
    });
    if (login.ok) setTimeout(() => location.href = '/projects.html', 500);
    else location.href = '/login.html';
  } else {
    showMsg('msg', res.error || '注册失败', 'error');
  }
});
</script>

</body></html>
